; ===========================================
; IOCP MMO Server 설정 파일
; ===========================================

[Server]
; GameServer / NetWorkLib_EchoTest / GameCodiEchoTest
Mode=GameServer
Port=6000
MaxClients=10000
MonitorPort=9090
MonitorEnabled=1

; 서버가 쓸 물리코어 범위 (HT 형제 자동 포함). 빈칸=미적용. 예 0-5=물리 6코어
ServerCores=0-5

; IOCP 워커 스레드 (0 = 자동: 서버 affinity 코어 수) / WTxK 스윕 실측 결과 4 채택. WT4 + SendWorkers=4 조합 금지 (IOCP 완료 포화)
WorkerThreads=4

; 송신 워커 (0/1 = 단일, 2+ = sessionId%K 워커 풀)
SendWorkers=2

; RIO 전송 워커 수 (USE_RIO_TRANSPORT=1 빌드 전용, 0=자동 2)
RioWorkers=2
MapCount=1

; -------------------------------------------
; 기본 설정 (개별 [MapN] 섹션이 없으면 이 값을 사용)
; -------------------------------------------

[MapDefault]
Width=120
Height=120
SectorSize=20
MaxPlayersPerChannel=10000

; -------------------------------------------
; 개별 맵 오버라이드 (필요한 맵만 작성)
; -------------------------------------------
; [Map1]
; Width=600
; Height=600

[DB]
; DB 저장 파이프라인 (USE_DB_WORKER).
; [보안] DB 비번은 원칙상 분리 저장하지만, 클라우드 실험·편의 위해 일단 평문 유지
Host=127.0.0.1
Port=3306
User=game_server
Password=game_server
Database=gamedb
Workers=1
SavePeriodSec=10
ConnectTimeoutSec=3
RwTimeoutSec=5
QueueMax=20000
