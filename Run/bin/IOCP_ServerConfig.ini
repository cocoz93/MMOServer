; ===========================================
; IOCP MMO Server 설정 파일
; ===========================================

[Server]
; GameServer / NetWorkLib_EchoTest / GameCodiEchoTest
Mode=GameServer
Port=6000
MaxClients=10000
MonitorPort=9090
MonitorEnabled=1

; 서버가 쓸 물리코어 범위 (HT 형제 자동 포함). 빈칸=미적용. 예 0-5=물리 6코어
ServerCores=0-5

; IOCP worker threads (0 = auto: server affinity core count)
WorkerThreads=0

; Send threads/lanes (0/1 = single, 2+ = sessionId%K lane pool)
SendWorkers=2
MapCount=1

; -------------------------------------------
; 기본 설정 (개별 [MapN] 섹션이 없으면 이 값을 사용)
; -------------------------------------------

[MapDefault]
Width=120
Height=120
SectorSize=20
MaxPlayersPerChannel=10000

; -------------------------------------------
; 개별 맵 오버라이드 (필요한 맵만 작성)
; -------------------------------------------
; [Map1]
; Width=600
; Height=600
