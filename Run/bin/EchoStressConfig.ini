; ===========================================
; Custom Echo Stress 설정 파일
; ===========================================

[Stress]
ServerIp=127.0.0.1
Port=6000
ClientCount=1000
DisconnectTest=1
OverSendCount=100
LoopDelayMs=1

; --- 아래 항목은 기본값 유지 권장 ---
ReconnectIntervalMs=1000
EchoTimeoutMs=500
TestDurationSec=0
MonitorPort=9092
MinPacketSize=12
MaxPacketSize=256

; --- 공격 테스트 ---
; 0=정상 에코, 1=비정상 패킷 크기, 2=패킷 폭주, 3=idle(타임아웃), 4=sendQ 압박
AttackMode=1
; 0=전원 공격, N=앞에서 N명만 공격 (나머지 정상 에코)
AttackClientCount=0
