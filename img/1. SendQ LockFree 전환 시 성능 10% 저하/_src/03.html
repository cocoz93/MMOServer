<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1f2330; --muted:#7c8597;
    --red:#d7263d; --blue:#3a78b8; --blue-ink:#2b6aa8;
    --gray-fill:#e2e6ec; --slate:#566072; --pill-gray:#e9edf3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1200px;height:600px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}
  .card{position:absolute;top:24px;left:24px;width:1152px;height:552px;background:var(--card);
    border:1px solid #eef0f3;border-radius:30px;box-shadow:0 14px 44px rgba(30,40,70,.07);
    padding:30px 56px 0}
  .title{font-size:38px;font-weight:800;color:var(--ink);letter-spacing:-.6px;line-height:1.08}
  .title .r{color:var(--red)}
  .sub{margin-top:10px;font-size:20px;font-weight:500;color:var(--muted)}
  .sub b{color:#3a4254;font-weight:700}

  .stage{margin-top:26px;display:grid;grid-template-columns:1fr 150px 1fr;align-items:start;position:relative}
  .col{display:flex;flex-direction:column;align-items:center;position:relative}
  .rcaption{position:absolute;top:-34px;left:0;right:0;text-align:center;
    font-size:19px;font-weight:800;color:var(--red);letter-spacing:-.3px}

  .pill{font-size:18px;font-weight:800;padding:6px 18px;border-radius:999px;letter-spacing:-.3px}
  .pill.before{background:var(--pill-gray);color:var(--slate)}
  .pill.after{background:var(--red);color:#fff}

  .boxes{display:flex;gap:8px;margin-top:18px}
  .box{width:25px;height:25px;border-radius:7px}
  .box.b{background:linear-gradient(180deg,#4a86c4,#356ba8)}
  .box.r{background:linear-gradient(180deg,#e23f53,#cf1d34)}

  .arrowcap{margin-top:14px;font-size:16px;font-weight:700}
  .arrowcap.b{color:var(--blue-ink)}
  .arrowcap.r{color:var(--red)}

  .donut{margin-top:12px;position:relative;width:222px;height:222px}
  .donut svg{display:block;width:100%;height:100%}
  .donut .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .donut .lbl .n{font-size:47px;font-weight:800;letter-spacing:-1.5px}
  .donut .lbl .u{font-size:15px;font-weight:700;margin-top:5px;color:#5a7894}
  .donut .lbl.b .n{color:var(--blue-ink)}
  .donut .lbl.r .n{color:var(--red)}

  .bignum{margin-top:7px;font-weight:800;letter-spacing:-1px}
  .bignum .n{font-size:35px}
  .bignum .u{font-size:21px;font-weight:700}
  .bignum.b{color:var(--blue-ink)}
  .bignum.b .u{color:#46627f}
  .bignum.r .n{color:var(--red)}
  .bignum.r .u{color:#46627f}

  .botcap{margin-top:16px;font-size:17px;font-weight:500;color:#8089a0}
  .botcap b{color:#3a4254;font-weight:700}

  .arrowcol{display:flex;flex-direction:column;align-items:center;padding-top:164px}
  .arrowcol .t{font-size:18px;font-weight:800;color:var(--red);text-align:center;line-height:1.16;margin-bottom:8px}

  .foot{position:absolute;left:56px;right:56px;bottom:15px;padding-top:11px;border-top:1px solid #eef0f3;
    font-size:16px;color:#9aa3b2;font-weight:500}
  .foot b{color:#6b7484;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="title">SendQ <span class="r">한 칸</span>에 담기는 양 — 데이터 전체 vs 포인터</div>
    <div class="sub">RingBuffer는 <b>버퍼 통째로 복사</b></div>

    <div class="stage">
      <!-- LEFT -->
      <div class="col">
        <div class="pill before">변경 전 · RingBuffer</div>
        <div class="boxes"><span class="box b"></span><span class="box b"></span><span class="box b"></span><span class="box b"></span><span class="box b"></span></div>
        <div class="arrowcap b">전체 복사 ↓</div>
        <div class="donut"><svg viewBox="0 0 240 240"><g id="ringL"></g></svg><div class="lbl b"><span class="n">N</span><span class="u">바이트</span></div></div>
      </div>

      <!-- CENTER ARROW -->
      <div class="arrowcol">
        <div class="t">LockFree<br>전환</div>
        <svg width="92" height="34" viewBox="0 0 92 34">
          <defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#d7263d"/></marker></defs>
          <line x1="4" y1="17" x2="74" y2="17" stroke="#d7263d" stroke-width="6" stroke-linecap="round" marker-end="url(#ah)"/>
        </svg>
      </div>

      <!-- RIGHT -->
      <div class="col">
        <div class="pill after">변경 후 · LockFreeQ</div>
        <div class="boxes"><span class="box r"></span><span class="box r"></span><span class="box r"></span><span class="box r"></span><span class="box r"></span></div>
        <div class="arrowcap r">포인터만 ↓</div>
        <div class="donut"><svg viewBox="0 0 240 240"><g id="ringR"></g></svg><div class="lbl r"><span class="n">8</span><span class="u">바이트</span></div></div>
      </div>
    </div>

    <div class="foot">SendQ: CSerialBuffer 바이트 복사(RingBuffer) → CSerialBuffer* 포인터 저장(LockFree) · 기대: 복사 <b>N B → 8 B</b></div>
  </div>

<script>
function wedge(cx,cy,rO,rI,a0,a1){
  const P=(r,a)=>`${(cx+r*Math.cos(a)).toFixed(2)} ${(cy+r*Math.sin(a)).toFixed(2)}`;
  const large=(a1-a0)>Math.PI?1:0;
  return `M ${P(rO,a0)} A ${rO} ${rO} 0 ${large} 1 ${P(rO,a1)} L ${P(rI,a1)} A ${rI} ${rI} 0 ${large} 0 ${P(rI,a0)} Z`;
}
function buildRing(id, cells, theme){
  const cx=120,cy=120,rO=114,rI=77, N=cells.length;
  const gap = N>10 ? 3.2 : 5.5, step=360/N, ns="http://www.w3.org/2000/svg";
  const g=document.getElementById(id);
  for(let i=0;i<N;i++){
    const a0=(-90+i*step+gap/2)*Math.PI/180, a1=(-90+(i+1)*step-gap/2)*Math.PI/180;
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d',wedge(cx,cy,rO,rI,a0,a1));
    const c=cells[i];
    if(c==='dash'){p.setAttribute('fill','none');p.setAttribute('stroke',theme);
      p.setAttribute('stroke-width','2.6');p.setAttribute('stroke-dasharray','5 4');p.setAttribute('stroke-linejoin','round');}
    else p.setAttribute('fill',c);
    g.appendChild(p);
  }
}
const B='#3a78b8', R='#d7263d', G='#e2e6ec';
buildRing('ringL', ['dash',B,B,B,B,G], B);
const right=[]; for(let i=0;i<20;i++){ right.push(i===0?'dash':(i>=17?G:R)); }
buildRing('ringR', right, R);
</script>
</body>
</html>
