<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  :root{
    --bg:#eef1f5; --card:#fff; --ink:#1f2330; --muted:#7c8597;
    --red:#d7263d; --blue:#3a78b8; --blue-ink:#2b6aa8; --slate:#566072;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1160px;height:560px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}
  .card{position:absolute;top:24px;left:24px;width:1112px;height:512px;background:var(--card);
    border:1px solid #eef0f3;border-radius:30px;box-shadow:0 14px 44px rgba(30,40,70,.07);
    padding:32px 52px 0}

  .title{font-size:38px;font-weight:800;color:var(--ink);letter-spacing:-.6px;line-height:1.08}
  .title .r{color:var(--red)}
  .uline{width:84px;height:6px;border-radius:3px;background:var(--red);margin-top:12px}
  .sub{margin-top:12px;font-size:20px;font-weight:500;color:var(--muted)}

  /* pipeline */
  .pipe{margin-top:30px;display:flex;align-items:center;justify-content:space-between}
  .node{width:204px;height:134px;border-radius:18px;border:1.5px solid #e7ebf1;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    box-shadow:0 5px 16px rgba(30,40,70,.05);position:relative;overflow:hidden}
  .node::before{content:"";position:absolute;top:0;left:0;right:0;height:5px}
  .node.b::before{background:var(--blue)}
  .node.r::before{background:var(--red)}
  .node .tag{font-size:14px;font-weight:800;padding:3px 13px;border-radius:999px;letter-spacing:-.2px}
  .node.b .tag{background:#e7f0fa;color:var(--blue-ink)}
  .node.r .tag{background:#fde7ea;color:var(--red)}
  .node .t{font-size:23px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
  .node .s{font-size:15px;color:#8a93a5;font-weight:600;letter-spacing:-.2px}

  .qcard{width:246px;height:134px;border-radius:18px;border:1.6px dashed #c2d0e2;background:#f6f9fc;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .qcard .qt{font-size:17px;font-weight:800;color:#2b4a72;letter-spacing:-.3px}
  .qcard .qt b{color:var(--blue-ink)}
  .slots{display:flex;gap:5px}
  .slot{width:19px;height:27px;border-radius:5px;border:1.6px solid #cdd7e4;background:#fff}
  .slot.fill{background:linear-gradient(180deg,#4a86c4,#356ba8);border-color:#356ba8}
  .qcard .qc{font-size:14px;font-weight:700;color:#8089a0;letter-spacing:-.2px}

  .arr{display:flex;flex-direction:column;align-items:center;width:62px}
  .arr .al{font-size:14.5px;font-weight:800;margin-bottom:4px;letter-spacing:-.2px}
  .arr.b .al{color:var(--blue-ink)} .arr.r .al{color:var(--red)} .arr.g .al{color:#9aa3b2}

  .client{width:80px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .client .ico{width:54px;height:54px;border-radius:14px;background:#f1f3f7;border:1.5px solid #e3e7ee;
    display:flex;align-items:center;justify-content:center;font-size:30px}
  .client .cl{font-size:16px;font-weight:700;color:var(--slate)}

  /* cause -> effect chain */
  .chain{margin-top:48px;display:flex;align-items:center;justify-content:center;gap:14px}
  .chip{padding:16px 26px;border-radius:14px;font-size:20px;font-weight:600;background:#f3f5f9;color:#46506a;letter-spacing:-.3px;white-space:nowrap}
  .chip b{font-weight:800;color:var(--ink)}
  .chip.concl{background:#fdeef0;color:#b3122a;border:1.5px solid #f4c4cc}
  .chip.concl b{color:var(--red)}
  .chev{color:#c2c9d6;font-size:24px;font-weight:900}

  .foot{position:absolute;left:52px;right:52px;bottom:17px;padding-top:12px;border-top:1px solid #eef0f3;
    font-size:15.5px;color:#9aa3b2;font-weight:500;letter-spacing:-.2px}
  .foot b{color:#6b7484;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="title">락프리 이점이 <span class="r">0</span>인 이유 — 다툴 경합이 없다 (SPSC)</div>
    <div class="uline"></div>
    <div class="sub">생산자 1 · 소비자 1 · 큐 깊이 ≈ 1 · 동접 200 · 즉시송신</div>

    <div class="pipe">
      <div class="node b">
        <div class="tag">생산자 · 1</div>
        <div class="t">게임 루프</div>
        <div class="s">Enqueue</div>
      </div>

      <div class="arr b">
        <div class="al">넣기</div>
        <svg width="58" height="22"><path d="M2 11 H40" stroke="#2b6aa8" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M38 4 L52 11 L38 18 Z" fill="#2b6aa8"/></svg>
      </div>

      <div class="qcard">
        <div class="qt">SendQ · 깊이 <b>≈ 1</b></div>
        <div class="slots">
          <span class="slot fill"></span><span class="slot"></span><span class="slot"></span><span class="slot"></span>
          <span class="slot"></span><span class="slot"></span><span class="slot"></span><span class="slot"></span>
        </div>
        <div class="qc">넣자마자 바로 빠짐 · 거의 빔</div>
      </div>

      <div class="arr r">
        <div class="al">꺼내기</div>
        <svg width="58" height="22"><path d="M2 11 H40" stroke="#d7263d" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M38 4 L52 11 L38 18 Z" fill="#d7263d"/></svg>
      </div>

      <div class="node r">
        <div class="tag">소비자 · 1</div>
        <div class="t">송신 워커</div>
        <div class="s">Dequeue + WSASend</div>
      </div>

      <div class="arr g">
        <div class="al">전송</div>
        <svg width="58" height="22"><path d="M2 11 H40" stroke="#9aa3b2" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M38 4 L52 11 L38 18 Z" fill="#9aa3b2"/></svg>
      </div>

      <div class="client">
        <div class="ico">💻</div>
        <div class="cl">클라</div>
      </div>
    </div>

    <div class="chain">
      <div class="chip"><b>큐가 거의 빔</b></div>
      <div class="chev">→</div>
      <div class="chip"><b>다툴 일이 없음</b> · 경합 0</div>
      <div class="chev">→</div>
      <div class="chip concl">락프리 이득 <b>≈ 0</b> · 비용만 남음</div>
    </div>

    <div class="foot">_sending은 꺼내기·전송만 잠금(넣기는 안 막음) · 부하나 coalescing으로 큐가 깊어지면 겹침↑ → 그때 재평가</div>
  </div>
</body>
</html>
