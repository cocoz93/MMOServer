<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  :root{
    --bg:#eef1f5; --card:#fff; --ink:#1f2330; --muted:#7c8597;
    --red:#d7263d; --indigo:#3a78b8; --indigo-deep:#2b6aa8; --slate:#566072;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1200px;height:700px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}
  .card{position:absolute;top:24px;left:24px;width:1152px;height:652px;background:var(--card);
    border:1px solid #eef0f3;border-radius:30px;box-shadow:0 1px 3px rgba(30,40,70,.05),0 14px 44px rgba(30,40,70,.075);
    padding:34px 56px 0}

  .title{font-size:38px;font-weight:800;color:var(--ink);letter-spacing:-.7px;line-height:1.08}
  .title .r{color:var(--red)}
  .uline{width:82px;height:6px;border-radius:3px;background:var(--red);margin-top:12px}
  .sub{margin-top:12px;font-size:20px;font-weight:500;color:var(--muted);letter-spacing:-.2px}
  .sub b{color:#3a4254;font-weight:700}

  .stage{margin-top:6px}
  .stage svg{display:block;width:1040px;height:360px}

  .band{margin-top:10px;display:flex;align-items:center;gap:14px;background:#f7f8fb;border:1.5px solid #e7ebf1;
    border-left:6px solid var(--indigo-deep);border-radius:14px;padding:16px 24px}
  .band .ic{font-size:26px;flex:none}
  .band .bt{font-size:19.5px;font-weight:600;color:#46506a;letter-spacing:-.3px;line-height:1.35}
  .band .bt b{font-weight:800;color:var(--indigo-deep)}
  .band .bt code{font-family:'Pretendard',sans-serif;font-weight:800;color:var(--ink);background:#eef0f6;padding:1px 9px;border-radius:6px}

  .foot{position:absolute;left:56px;right:56px;bottom:16px;padding-top:12px;border-top:1px solid #eef0f3;
    font-size:15px;color:#9aa3b2;font-weight:500;letter-spacing:-.2px}
  .foot b{color:#6b7484;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="title">휠의 물리적 구조 — <span class="r">원형 배열</span> × 이중 연결 리스트</div>
    <div class="uline"></div>
    <div class="sub">슬롯 배열이 <b>원형 버퍼</b>처럼 순환 · 각 슬롯 = sentinel 기반 이중 연결 리스트</div>

    <div class="stage">
      <svg viewBox="0 0 1100 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah" markerWidth="8" markerHeight="8" refX="5.5" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="#8a93a5"/></marker>
          <marker id="ahR" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
            <path d="M0,0 L9,4.5 L0,9 Z" fill="#d7263d"/></marker>
          <marker id="ahI" markerWidth="8" markerHeight="8" refX="5.5" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="#3a78b8"/></marker>
        </defs>

        <!-- ===== ring (left) ===== -->
        <g id="ring"></g>
        <circle cx="195" cy="192" r="56" fill="#fff" stroke="#e2e6ec" stroke-width="2"/>
        <text x="195" y="186" text-anchor="middle" font-size="22" font-weight="800" fill="#566072">13 슬롯</text>
        <text x="195" y="212" text-anchor="middle" font-size="14.5" font-weight="700" fill="#9aa3b2">원형 버퍼</text>
        <text x="233" y="28" text-anchor="middle" font-size="15" font-weight="800" fill="#d7263d">cursor</text>

        <!-- ===== connector: highlighted slot -> list ===== -->
        <line x1="358" y1="204" x2="448" y2="192" stroke="#b7c0cc" stroke-width="6" stroke-linecap="round" marker-end="url(#ah)"/>

        <!-- ===== doubly-linked list (right) ===== -->
        <text x="750" y="60" text-anchor="middle" font-size="30" font-weight="800" fill="#1f2330">한 슬롯의 내부 — 이중 연결 리스트</text>

        <!-- sentinel -->
        <rect x="452" y="144" width="168" height="96" rx="16" fill="#e7f0fa" stroke="#3a78b8" stroke-width="2"/>
        <text x="536" y="186" text-anchor="middle" font-size="24" font-weight="800" fill="#2b6aa8">sentinel</text>
        <text x="536" y="211" text-anchor="middle" font-size="14" font-weight="700" fill="#3a78b8">더미 헤드</text>
        <!-- Session D -->
        <rect x="666" y="144" width="168" height="96" rx="16" fill="#fff" stroke="#9ca3af" stroke-width="1.8"/>
        <text x="750" y="184" text-anchor="middle" font-size="22" font-weight="800" fill="#374151">Session D</text>
        <text x="750" y="209" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9ca3af">node</text>
        <!-- Session E -->
        <rect x="880" y="144" width="168" height="96" rx="16" fill="#fff" stroke="#9ca3af" stroke-width="1.8"/>
        <text x="964" y="184" text-anchor="middle" font-size="22" font-weight="800" fill="#374151">Session E</text>
        <text x="964" y="209" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9ca3af">node</text>

        <!-- prev/next arrows -->
        <line x1="622" y1="192" x2="664" y2="192" stroke="#8a93a5" stroke-width="2.8" marker-start="url(#ah)" marker-end="url(#ah)"/>
        <line x1="836" y1="192" x2="878" y2="192" stroke="#8a93a5" stroke-width="2.8" marker-start="url(#ah)" marker-end="url(#ah)"/>
        <text x="643" y="174" text-anchor="middle" font-size="12" font-weight="800" fill="#9aa3b2">prev/next</text>

        <!-- circular wrap: tail back to sentinel -->
        <path d="M964 240 C 964 328, 536 328, 536 240" fill="none" stroke="#3a78b8" stroke-width="2.6"
              stroke-dasharray="7 5" marker-start="url(#ahI)" marker-end="url(#ahI)"/>
        <text x="750" y="352" text-anchor="middle" font-size="22" font-weight="800" fill="#2b6aa8">tail ↔ sentinel 순환 (환형 리스트)</text>
      </svg>
    </div>

    <div class="band">
      <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3a78b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div class="bt">노드는 세션 인덱스로 <b>사전 할당</b> — <code>nodes[sessionIndex]</code> 로 O(1) 접근하며, 런타임 동적 할당·해제가 없다.</div>
    </div>

    <div class="foot">슬롯 배열이 원형 버퍼처럼 순환 · 각 슬롯 내부는 <b>sentinel(더미 헤드)</b> 기반 이중 연결 리스트 · 빈 리스트에서도 분기 없이 삽입/제거</div>
  </div>

<script>
function wedge(cx,cy,rO,rI,a0,a1){
  const P=(r,a)=>`${(cx+r*Math.cos(a)).toFixed(2)} ${(cy+r*Math.sin(a)).toFixed(2)}`;
  const large=(a1-a0)>Math.PI?1:0;
  return `M ${P(rO,a0)} A ${rO} ${rO} 0 ${large} 1 ${P(rO,a1)} L ${P(rI,a1)} A ${rI} ${rI} 0 ${large} 0 ${P(rI,a0)} Z`;
}
(function(){
  const cx=195,cy=192,rO=158,rI=96,N=13,gap=2.6,step=360/N,ns="http://www.w3.org/2000/svg";
  const g=document.getElementById('ring');
  for(let i=0;i<N;i++){
    const a0=(-90+i*step+gap/2)*Math.PI/180, a1=(-90+(i+1)*step-gap/2)*Math.PI/180;
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d',wedge(cx,cy,rO,rI,a0,a1));
    p.setAttribute('fill', i===3 ? '#3a78b8' : '#e2e6ec');
    g.appendChild(p);
  }
  // cursor hand -> slot 0 (top)
  const ca=(-90+0.5*step)*Math.PI/180;
  const hx=cx+(rI+8)*Math.cos(ca), hy=cy+(rI+8)*Math.sin(ca);
  const tx=cx+(rO-6)*Math.cos(ca), ty=cy+(rO-6)*Math.sin(ca);
  const hand=document.createElementNS(ns,'line');
  hand.setAttribute('x1',hx);hand.setAttribute('y1',hy);hand.setAttribute('x2',tx);hand.setAttribute('y2',ty);
  hand.setAttribute('stroke','#d7263d');hand.setAttribute('stroke-width','4.5');hand.setAttribute('stroke-linecap','round');
  hand.setAttribute('marker-end','url(#ahR)');
  g.appendChild(hand);
})();
</script>
</body>
</html>
