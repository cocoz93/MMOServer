<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1f2330; --muted:#7c8597;
    --red:#d7263d; --red-deep:#b3122a; --pill-gray:#e9edf3; --slate:#566072; --line:#eef0f3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1040px;height:560px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}
  .card{position:absolute;top:20px;left:20px;width:1000px;height:520px;background:var(--card);
    border:1px solid var(--line);border-radius:28px;box-shadow:0 14px 44px rgba(30,40,70,.07);
    padding:30px 46px 0}

  .title{font-size:29px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
  .title .r{color:var(--red)}
  .sub{margin-top:7px;font-size:16px;font-weight:500;color:var(--muted)}

  .stage{margin-top:26px;display:flex;align-items:center;height:300px;position:relative}

  .zone{display:flex;flex-direction:column;align-items:center}
  .zone.left{flex:0 0 560px}
  .zone.right{flex:1;opacity:.55}

  .tag{font-size:14px;font-weight:800;padding:5px 16px;border-radius:999px;letter-spacing:-.2px;margin-bottom:20px}
  .tag.adopt{background:var(--red);color:#fff}
  .tag.reject{background:var(--pill-gray);color:var(--slate)}

  .cluster{display:grid;grid-template-columns:repeat(2,104px);grid-template-rows:repeat(2,104px);gap:10px}
  .worker{position:relative;border-radius:50%;background:radial-gradient(circle at 32% 28%,#ea5468,#c81c33);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;
    box-shadow:0 8px 18px rgba(199,30,50,.28)}
  .worker .send{position:absolute;right:-10px;bottom:-8px;background:#fff;color:var(--red-deep);
    font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:999px;box-shadow:0 3px 8px rgba(0,0,0,.14)}

  .caption{margin-top:22px;font-size:16.5px;font-weight:800;color:var(--ink);text-align:center}
  .caption span{color:var(--red)}

  .lonely{width:82px;height:82px;border-radius:50%;background:#fff;border:2.4px dashed #c3cad6;
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:800;font-size:14px;
    text-align:center;line-height:1.25;position:relative}
  .lonely::after{content:'✕';position:absolute;top:-9px;right:-9px;width:26px;height:26px;border-radius:50%;
    background:var(--slate);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .rcap{margin-top:22px;font-size:14.5px;font-weight:700;color:var(--muted);text-align:center;line-height:1.3}

  .divider{position:absolute;left:600px;top:6px;bottom:6px;width:0;border-left:2.2px dashed #d5dae2}
  .divlbl{position:absolute;left:600px;top:-14px;transform:translateX(-50%);background:var(--card);
    padding:0 10px;font-size:13px;font-weight:800;color:#aab2c0;white-space:nowrap}

  .foot{position:absolute;left:46px;right:46px;bottom:24px;padding-top:14px;border-top:1px solid var(--line);
    font-size:15px;color:#8089a0;font-weight:500}
  .foot b{color:#3a4254;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="title">Send는 <span class="r">Worker</span> 안에서 끝난다</div>
    <div class="sub">SendThread를 따로 두지 않는다 — 현재 규모에서는 분리할 이유가 없다</div>

    <div class="stage">
      <div class="zone left">
        <span class="tag adopt">채택</span>
        <div class="cluster">
          <div class="worker">Worker<span class="send">Send</span></div>
          <div class="worker">Worker<span class="send">Send</span></div>
          <div class="worker">Worker<span class="send">Send</span></div>
          <div class="worker">Worker<span class="send">Send</span></div>
        </div>
        <div class="caption">Worker = <span>Send까지 한 몸</span></div>
      </div>

      <div class="divider"></div>
      <div class="divlbl">따로 두지 않음</div>

      <div class="zone right">
        <span class="tag reject">기각</span>
        <div class="lonely">Send<br>Thread</div>
        <div class="rcap">떼어낸 전용 스레드<br>— 이번엔 안 만든다</div>
      </div>
    </div>

    <div class="foot">각 Worker가 직접 <b>WSASend</b> 호출 · 큐·전용 스레드 추가 없이 즉시 송신 — 트레이드오프 상세는 노션 원문 참고</div>
  </div>
</body>
</html>
