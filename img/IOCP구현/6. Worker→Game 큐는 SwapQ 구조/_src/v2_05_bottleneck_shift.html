<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .card{ padding:38px 58px; }
  .eyebrow{ margin-bottom:12px; }
  .h-title{ font-size:46px; }
  .h-rule{ margin:15px 0 12px; }
  .h-sub{ font-size:20px; }

  .body{ flex-direction:column; justify-content:center; gap:22px; padding-top:8px; }

  /* 큰 인과 흐름 : 서버 → 트래픽 → 클라 (한 방 메시지) */
  .flow{ display:flex; align-items:flex-start; justify-content:center; gap:16px; width:100%; }
  .node{ flex:0 0 auto; width:284px; border-radius:28px; padding:30px 20px; text-align:center; position:relative;
         box-shadow:0 4px 14px rgba(15,23,42,.08); }
  .node.srv{ background:var(--green-bg); border:2px solid var(--green-line); }
  .node.cli{ background:var(--red-bg);   border:2px solid var(--red-line); }
  .node .ic{ width:90px; height:90px; border-radius:27px; margin:0 auto 17px; display:flex; align-items:center; justify-content:center; }
  .node.srv .ic{ background:var(--green-line); }
  .node.cli .ic{ background:var(--red-line); }
  .node .ic svg{ width:47px; height:47px; }
  .node .lb{ font-size:33px; font-weight:800; letter-spacing:-.8px; }
  .node.srv .lb{ color:var(--green-deep); }
  .node.cli .lb{ color:var(--red-deep); }
  .node .st{ display:inline-block; margin-top:15px; font-size:17px; font-weight:800; color:#fff; padding:8px 21px; border-radius:999px; }
  .node.srv .st{ background:var(--green); }
  .node.cli .st{ background:var(--red); }

  /* 트래픽 화살표 (아이콘 라인에 정렬) */
  .arrow{ flex:1 1 auto; min-width:180px; display:flex; flex-direction:column; align-items:center; gap:13px; padding:34px 8px 0; }
  .arrow .atop{ font-size:17.5px; font-weight:800; color:var(--red-deep); white-space:nowrap; }
  .arrow .bar{ position:relative; width:100%; height:16px; border-radius:8px; background:var(--red); }
  .arrow .bar::after{ content:""; position:absolute; right:-22px; top:50%; transform:translateY(-50%);
                      border-top:16px solid transparent; border-bottom:16px solid transparent; border-left:24px solid var(--red); }
  .arrow .bar .p{ position:absolute; top:50%; transform:translate(-50%,-50%); width:9px; height:9px; border-radius:50%; background:#fff; opacity:.92; }

  /* 결론 한 줄 (배경 초록→빨강 = 이동 은유) */
  .concl{ display:flex; align-items:center; gap:18px; width:100%; padding:20px 28px; border-radius:20px;
          background:#fff; border:1.5px solid var(--line);
          box-shadow:0 4px 14px rgba(15,23,42,.06); }
  .concl .ic{ flex:0 0 auto; width:48px; height:48px; border-radius:15px; background:#566072;
              display:flex; align-items:center; justify-content:center; }
  .concl .ic svg{ width:26px; height:26px; }
  .concl .tx{ font-size:21px; font-weight:800; color:var(--ink); letter-spacing:-.4px; }
  .concl .tx .g{ color:var(--green-deep); }
  .concl .tx .r{ color:var(--red-deep); }

  .foot b{ color:var(--sub); font-weight:800; }
</style></head>
<body><div class="card">
  <div class="eyebrow"><span class="no">⑤</span> 관측 · RTT 증가 (가설)</div>
  <div class="h-title">병목은 <span class="k">클라</span>로 옮겨갔다</div>
  <div class="h-rule"></div>
  <div class="h-sub">직관과 반대 — <b>swapQ로 서버를 고쳤는데</b> RTT가 늘었다</div>

  <div class="body">
    <div class="flow">
      <div class="node srv">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#0d6b49" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/><path d="M7 7.5h.01M7 16.5h.01"/></svg></div>
        <div class="lb">서버</div>
        <div class="st">정상화 ✓</div>
      </div>

      <div class="arrow">
        <div class="atop">늘어난 정상 트래픽 ↑↑</div>
        <div class="bar"><span class="p" style="left:24%"></span><span class="p" style="left:50%"></span><span class="p" style="left:76%"></span></div>
      </div>

      <div class="node cli">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#b3122a" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4" width="19" height="13" rx="2"/><path d="M8.5 21h7M12 17v4"/></svg></div>
        <div class="lb">클라</div>
        <div class="st">select() 병목</div>
      </div>
    </div>

    <div class="concl">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 1 3.6 10.8c-.6.5-1 1.2-1.1 2l-.1.7H9.6l-.1-.7c-.1-.8-.5-1.5-1.1-2A6 6 0 0 1 12 3z"/><path d="M9.5 20h5M10.5 22h3"/></svg></span>
      <span class="tx"><span class="g">swapQ는 서버를 고쳤다</span> — 병목이 <span class="r">클라로 이동</span>한 신호 (가설)</span>
    </div>
  </div>

  <div class="foot">확정: <b>tick_duration</b> &lt;40ms · <b>send_packets</b> rate↑ · <b>ClientsPerThread</b>↓ 낮춰 분리 측정</div>
</div></body></html>
