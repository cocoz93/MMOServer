<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .card{ padding:36px 58px; }
  .eyebrow{ margin-bottom:11px; }
  .h-title{ font-size:40px; }
  .h-rule{ margin:13px 0 11px; }
  .h-sub{ font-size:19px; }

  .layer{ border-radius:22px; padding:22px 30px; display:flex; align-items:center; gap:22px; width:100%; }
  .layer.top{ background:var(--red-bg);   border:1.5px dashed var(--red); }
  .layer.bot{ background:var(--green-bg); border:1.5px solid var(--green-line); margin-top:13px; }
  .layer .ico{ flex:0 0 auto; width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center; }
  .layer.top .ico{ background:var(--red-line); }
  .layer.bot .ico{ background:var(--green-line); }
  .layer .ico svg{ width:30px; height:30px; }
  .layer .txt{ flex:1; }
  .layer .t{ font-size:23px; font-weight:800; color:var(--ink); display:flex; align-items:center; gap:11px; }
  .layer .badge{ font-size:15px; font-weight:800; color:#fff; padding:5px 15px; border-radius:999px; white-space:nowrap; }
  .layer.top .badge{ background:var(--red); }
  .layer.bot .badge{ background:var(--green); }
  .layer .d{ font-size:16px; font-weight:600; color:var(--sub); margin-top:6px; line-height:1.4; }
  .layer .d b{ color:var(--red-deep); font-weight:800; }
  .layer.bot .d b{ color:var(--green-deep); }
  .layer .big{ flex:0 0 auto; font-size:29px; font-weight:800; letter-spacing:-1.2px; white-space:nowrap; }
  .layer.top .big{ color:var(--red-deep); }
  .layer.bot .big{ color:var(--green-deep); }

  .down{ display:flex; align-items:center; justify-content:center; gap:8px; font-size:14px; color:var(--faint); font-weight:800; margin:10px 0; }
  .down svg{ width:16px; height:16px; }

  .meanslabel{ margin:15px 0 9px; font-size:14.5px; font-weight:800; color:var(--green-deep); }
  .meanslabel .c{ font-size:11px; color:#fff; background:var(--green); padding:2px 9px; border-radius:999px; margin-left:8px; }
  .means{ display:flex; gap:12px; width:100%; }
  .m{ flex:1; background:#fff; border:1.4px solid var(--green-line); border-radius:14px; padding:12px 14px;
      display:flex; align-items:center; gap:12px; }
  .m .ico{ flex:0 0 auto; width:38px; height:38px; border-radius:11px; background:var(--green-bg); display:flex; align-items:center; justify-content:center; }
  .m .ico svg{ width:21px; height:21px; }
  .m .t{ font-size:15px; font-weight:800; color:var(--ink); }
  .m .dd{ font-size:12.5px; font-weight:600; color:var(--sub); margin-top:2px; }
  .m.core{ border:1.8px solid var(--green); }
</style></head>
<body><div class="card">
  <div class="eyebrow"><span class="no">③</span> 핵심 문제 · 두 층위</div>
  <div class="h-title"><span class="k">소비 방식</span>과 <span class="kg">처리 용량</span></div>
  <div class="h-rule"></div>
  <div class="h-sub">고치는 층위가 다르다 — 응급 처치 vs 근본 해결</div>

  <div class="body" style="flex-direction:column; justify-content:center;">
    <div class="layer top">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#b3122a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 1 5.4-5.4l-2.3 2.3-2-2z"/></svg></div>
      <div class="txt"><div class="t">소비 방식 <span class="badge">응급</span></div>
        <div class="d">터지는 방식만 바꿀 뿐 — 지연·메모리로 <b>유입은 그대로</b></div>
      </div>
      <div class="big">형태만 이동</div>
    </div>
    <div class="down"><svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v14M6 13l6 6 6-6"/></svg>유입은 줄지 않는다</div>
    <div class="layer bot">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0d6b49" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 5-3 8-7 9-4-1-7-4-7-9V7z"/></svg></div>
      <div class="txt"><div class="t">처리 용량 <span class="badge">근본</span></div>
        <div class="d"><b>용량↑ 또는 유입↓</b>가 필요 · 고쳐야 양이 준다</div>
      </div>
      <div class="big">용량 ↑</div>
    </div>

    <div class="meanslabel">근본 수단<span class="c">핵심 = 스레드 샤딩</span></div>
    <div class="means">
      <div class="m core"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0d6b49" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div><div><div class="t">스레드 샤딩</div><div class="dd">존 단위 병렬화</div></div></div>
      <div class="m"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0d6b49" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M14 6l6 6-6 6"/></svg></div><div><div class="t">입력 병합</div><div class="dd">최신 이동만 반영</div></div></div>
      <div class="m"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0d6b49" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M5 8l7-5 7 5M5 16l7 5 7-5"/></svg></div><div><div class="t">브로드캐스트 절감</div><div class="dd">시야 컬링</div></div></div>
      <div class="m"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0d6b49" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 5-3 8-7 9-4-1-7-4-7-9V7z"/></svg></div><div><div class="t">백프레셔</div><div class="dd">큐 상한·스로틀</div></div></div>
    </div>
  </div>

  <div class="foot">소비 루프 개선은 <b>응급처치</b>로 본다 · 병목 단계를 먼저 측정한 뒤 손댄다</div>
</div></body></html>
