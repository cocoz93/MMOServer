<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  :root{
    --bg:#eef1f5; --card:#fff; --ink:#1f2330; --muted:#7c8597;
    --red:#d7263d; --deep:#b3122a; --blue:#3a78b8; --blue-ink:#2b6aa8; --slate:#566072;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1180px;height:620px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased}
  .card{position:absolute;top:24px;left:24px;width:1132px;height:572px;background:var(--card);
    border:1px solid #eef0f3;border-radius:30px;box-shadow:0 1px 3px rgba(30,40,70,.05),0 14px 44px rgba(30,40,70,.075);
    padding:34px 56px 0}

  .title{font-size:40px;font-weight:800;color:var(--ink);letter-spacing:-.6px;line-height:1.08}
  .title .r{color:var(--red)}
  .uline{width:84px;height:6px;border-radius:3px;background:var(--red);margin-top:13px}
  .sub{margin-top:13px;font-size:21px;font-weight:500;color:var(--muted);letter-spacing:-.2px}
  .sub b{color:#3a4254;font-weight:700}

  .pipe{margin-top:42px;display:flex;align-items:center;justify-content:center}
  .node{width:318px;height:198px;border-radius:20px;border:1.5px solid #e7ebf1;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
    box-shadow:0 8px 22px rgba(30,40,70,.06);position:relative;overflow:hidden}
  .node::before{content:"";position:absolute;top:0;left:0;right:0;height:6px}
  .node.b::before{background:var(--blue)}
  .node.r::before{background:var(--red)}
  .node .tag{font-size:16px;font-weight:800;padding:6px 17px;border-radius:999px;letter-spacing:-.2px}
  .node.b .tag{background:#e7f0fa;color:var(--blue-ink)}
  .node.r .tag{background:#fde7ea;color:var(--red)}
  .node .t{font-size:36px;font-weight:800;letter-spacing:-.8px}
  .node.b .t{color:var(--blue-ink)} .node.r .t{color:var(--red)}
  .node .s{font-size:17.5px;color:#8a93a5;font-weight:600;letter-spacing:-.2px}

  .arr{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 22px;max-width:360px}
  .arr .al{font-size:18.5px;font-weight:800;color:var(--red);margin-bottom:12px;white-space:nowrap}
  .arr .bar{position:relative;width:100%;height:13px;border-radius:7px;
    background:var(--red)}
  .arr .bar::after{content:"";position:absolute;right:-16px;top:50%;transform:translateY(-50%);
    border-top:13px solid transparent;border-bottom:13px solid transparent;border-left:19px solid var(--red)}
  .arr .as{font-size:14.5px;font-weight:600;color:#8a93a5;margin-top:12px;white-space:nowrap}

  .chain{margin-top:38px;display:flex;align-items:center;justify-content:center;gap:14px}
  .chip{padding:16px 26px;border-radius:14px;font-size:20px;font-weight:600;background:#f3f5f9;color:#46506a;letter-spacing:-.3px;white-space:nowrap}
  .chip b{font-weight:800;color:var(--ink)}
  .chip.concl{background:#fdeef0;color:#b3122a;border:1.5px solid #f4c4cc}
  .chip.concl b{color:var(--red)}
  .chev{color:#c2c9d6;font-size:24px;font-weight:900}

  .foot{position:absolute;left:56px;right:56px;bottom:17px;padding-top:12px;border-top:1px solid #eef0f3;
    font-size:16px;color:#9aa3b2;font-weight:500;letter-spacing:-.2px}
  .foot b{color:#6b7484;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="title">병목은 <span class="r">클라</span>로 옮겨갔다</div>
    <div class="uline"></div>
    <div class="sub">swapQ로 서버가 정상화되자, 늘어난 트래픽이 클라 <b>select()</b>를 드러냈다</div>

    <div class="pipe">
      <div class="node b">
        <div class="tag">swapQ로 정상화</div>
        <div class="t">서버</div>
        <div class="s">틱 · SYNC · 이동 부활</div>
      </div>

      <div class="arr">
        <div class="al">늘어난 정상 트래픽 ↑↑</div>
        <div class="bar"></div>
        <div class="as">SYNC 보정 · 이동 브로드캐스트</div>
      </div>

      <div class="node r">
        <div class="tag">여기가 병목</div>
        <div class="t">클라</div>
        <div class="s">단일 select() · 호출당 O(N)</div>
      </div>
    </div>

    <div class="chain">
      <div class="chip"><b>swapQ는 서버를 고쳤다</b></div>
      <div class="chev">→</div>
      <div class="chip">늘어난 <b>정상 트래픽</b></div>
      <div class="chev">→</div>
      <div class="chip concl">병목이 <b>클라로 이동</b> · 가설</div>
    </div>

    <div class="foot">확정: <b>tick_duration</b> &lt;40ms · <b>send_packets</b> rate↑ · <b>ClientsPerThread</b>↓ 낮춰 분리 측정 (측정 확정 전 가설)</div>
  </div>
</body>
</html>
