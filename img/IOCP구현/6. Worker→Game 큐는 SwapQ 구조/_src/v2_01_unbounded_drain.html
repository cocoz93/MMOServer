<!doctype html><html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="common.css">
<style>
  .card{ padding:40px 58px; }
  .eyebrow{ margin-bottom:12px; }
  .h-title{ font-size:42px; }
  .h-rule{ margin:14px 0 12px; }
  .h-sub{ font-size:19px; }

  .stage{ display:flex; align-items:center; gap:0; width:100%; margin-top:6px; }

  .node{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; }
  .node .box{ border-radius:22px; padding:18px 26px; text-align:center; box-shadow:0 16px 32px -20px rgba(15,23,42,.32); min-width:168px; }
  .node .ico{ width:48px; height:48px; border-radius:15px; display:flex; align-items:center; justify-content:center; margin:0 auto 9px; }
  .node .ico svg{ width:25px; height:25px; }
  .node .lab{ font-size:19px; font-weight:800; }
  .node .sub{ font-size:13.5px; font-weight:600; margin-top:4px; }

  .workers .box{ background:var(--blue-bg); border:1.5px solid var(--blue-line); }
  .workers .ico{ background:#d6e4f5; }
  .workers .lab{ color:var(--blue-deep); }
  .workers .sub{ color:#5a7ca8; }

  .queue .box{ background:#e2e6ec; border:1.5px dashed #c2cad6; min-width:190px; position:relative; }
  .queue .ico{ background:#d9dfe7; }
  .queue .lab{ color:#566072; }
  .queue .sub{ color:#7c8597; }
  .queue .grow{ position:absolute; top:-15px; right:-10px; background:#d7263d; color:#fff;
                font-size:12.5px; font-weight:800; padding:5px 12px; border-radius:999px; box-shadow:0 2px 6px -2px rgba(215,38,61,.35); white-space:nowrap; }

  .game .box{ background:var(--red-bg); border:1.5px solid var(--red-line); position:relative; }
  .game .ico{ background:#fee2e2; }
  .game .lab{ color:var(--red-deep); }
  .game .sub{ color:#a34747; }
  .game .loop{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:#d7263d;
               color:#fff; font-size:12px; font-weight:800; padding:4px 11px; border-radius:999px; box-shadow:0 2px 6px -2px rgba(215,38,61,.35); white-space:nowrap; display:flex; align-items:center; gap:4px; }
  .game .loop svg{ width:11px; height:11px; animation:none; }

  .arrow{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 8px; }
  .arrow svg{ width:100%; height:20px; }
  .arrow .cap{ font-size:12.5px; font-weight:800; color:var(--faint); margin-top:5px; white-space:nowrap; }
  .arrow.hot .cap{ color:var(--red-deep); }

  .divider{ display:flex; align-items:center; gap:12px; margin:20px 0 18px; width:100%; }
  .divider .line{ flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--line) 30%,var(--line) 70%,transparent); }
  .divider .lab{ flex:0 0 auto; font-size:13.5px; font-weight:800; color:var(--red-deep); background:var(--red-bg);
                 border:1px solid var(--red-line); padding:5px 16px; border-radius:999px; white-space:nowrap; }

  .chips{ display:flex; gap:14px; width:100%; }
  .chip2{ flex:1; background:#fff; border:1px solid var(--line); border-radius:18px; box-shadow:0 12px 26px -20px rgba(15,23,42,.35);
          padding:16px 10px 14px; text-align:center; display:flex; flex-direction:column; align-items:center; position:relative; overflow:hidden; }
  .chip2::before{ content:""; position:absolute; top:0; left:0; right:0; height:3px; background:#d7263d; }
  .chip2 .ico{ width:40px; height:40px; border-radius:13px; background:var(--red-bg); display:flex; align-items:center; justify-content:center; margin-bottom:9px; margin-top:3px; }
  .chip2 .ico svg{ width:21px; height:21px; }
  .chip2 .t{ font-size:15.5px; font-weight:800; color:var(--ink); }
  .chip2 .d{ font-size:12.5px; font-weight:600; color:var(--sub); margin-top:3px; }
</style></head>
<body><div class="card">
  <div class="eyebrow"><span class="no">①</span> 문제 · WORKER → GAME 큐</div>
  <div class="h-title">게임 스레드는 <span class="k">멈추지 않는다</span></div>
  <div class="h-rule"></div>
  <div class="h-sub">"큐가 빌 때까지 전부 처리" — 처리량 상한이 없어 로직이 굶는다</div>

  <div class="body" style="flex-direction:column; justify-content:center;">
    <div class="stage">
      <div class="node workers">
        <div class="box">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#2b6aa8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg></div>
          <div class="lab">Worker</div><div class="sub">이벤트 생성</div>
        </div>
      </div>
      <div class="arrow">
        <svg viewBox="0 0 200 20"><defs><marker id="a1" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#94a3b8"/></marker></defs>
          <line x1="4" y1="10" x2="188" y2="10" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" marker-end="url(#a1)"/></svg>
        <div class="cap">push</div>
      </div>
      <div class="node queue">
        <div class="box">
          <div class="grow">계속 증가 ↑</div>
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#566072" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></div>
          <div class="lab">Event Queue</div><div class="sub">유입 &gt; 소비</div>
        </div>
      </div>
      <div class="arrow hot">
        <svg viewBox="0 0 200 20"><defs><marker id="a2" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#d7263d"/></marker></defs>
          <line x1="4" y1="10" x2="188" y2="10" stroke="#d7263d" stroke-width="4" stroke-linecap="round" marker-end="url(#a2)"/></svg>
        <div class="cap">while(!empty) 전부 소비</div>
      </div>
      <div class="node game">
        <div class="box">
          <div class="loop"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3"/><path d="M18 3v4h-4M6 21v-4h4"/></svg>무한 루프</div>
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#d7263d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v5l3.5 2"/></svg></div>
          <div class="lab">Game Thread</div><div class="sub">상한 없음 · 라이브 드레인</div>
        </div>
      </div>
    </div>

    <div class="divider"><div class="line"></div><div class="lab">▼ 관측되는 증상</div><div class="line"></div></div>

    <div class="chips">
      <div class="chip2"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#d7263d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2"/></svg></div><div class="t">로직 지연</div><div class="d">한 프레임 밀림</div></div>
      <div class="chip2"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#d7263d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg></div><div class="t">정합 붕괴</div><div class="d">이동 적분 튐</div></div>
      <div class="chip2"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#d7263d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div><div class="t">틱 적체</div><div class="d">큐 계속 증가</div></div>
      <div class="chip2"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="#d7263d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12c2-5 14-5 16 0M4 12c2 5 14 5 16 0"/></svg></div><div class="t">러버밴딩</div><div class="d">월드 갱신 정지</div></div>
    </div>
  </div>

  <div class="foot">근본 원인 — 소비 방식이 아니라 <b>단일 게임 스레드의 처리 용량</b>이 유입을 못 따라간다</div>
</div></body></html>
