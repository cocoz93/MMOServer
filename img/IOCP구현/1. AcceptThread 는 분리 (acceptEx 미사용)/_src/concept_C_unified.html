<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  *{box-sizing:border-box}
  :root{
    --bg1:#eef1f7; --bg2:#e5e9f1;
    --card:#fff; --ink:#0f172a; --sub:#5b6478; --muted:#8b93a5;
    --line:#e8ebf2;
    --red:#ef4444; --red-deep:#dc2626; --red-bg:#fef2f2; --red-line:#f8d2d2;
    --blue-deep:#2660a5; --blue-bg:#eaf2fb; --blue-line:#d7e6f8;
    --gray-bg:#f4f5f8; --gray-line:#e2e5ec; --gray-deep:#6b7385;
  }
  html,body{margin:0;width:1420px;height:660px;overflow:hidden;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}

  .card{position:absolute;inset:22px;background:var(--card);
    border-radius:30px;border:1px solid rgba(255,255,255,.7);
    box-shadow:0 32px 72px -22px rgba(15,23,42,.24),0 10px 24px -12px rgba(15,23,42,.10);
    padding:40px 54px 26px;overflow:hidden;display:flex;flex-direction:column}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,#2b6aa8,#5590c9 55%,#8fbde6)}

  .eyebrow{display:inline-flex;align-self:flex-start;align-items:center;gap:8px;font-size:16px;font-weight:800;
    letter-spacing:.2px;color:var(--blue-deep);background:var(--blue-bg);
    border:1px solid var(--blue-line);padding:7px 16px;border-radius:999px}

  .title{margin-top:16px;font-size:37px;font-weight:800;color:var(--ink);letter-spacing:-1px}
  .title .r{color:var(--red-deep)}
  .rule{width:72px;height:6px;border-radius:3px;margin:14px 0 11px;
    background:linear-gradient(90deg,var(--red),#fb7185)}
  .sub{font-size:18.5px;font-weight:500;color:var(--sub);line-height:1.5}

  .flow{margin-top:14px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}

  .node-row{width:1230px;
    display:grid;grid-template-columns:220px 90px 380px 160px 380px;align-items:center}

  .node{display:flex;flex-direction:column;align-items:center;gap:12px}

  .client-ico{width:84px;height:84px;border-radius:50%;position:relative;
    background:linear-gradient(135deg,#eef2f7,#e1e8f1);border:2px solid #d7dee8;
    display:flex;align-items:center;justify-content:center;color:#48505f;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 10px 20px -10px rgba(20,30,60,.35)}
  .client-ico::before{content:"";position:absolute;inset:-16px;z-index:-1;border-radius:50%;
    background:radial-gradient(circle,rgba(72,80,95,.10),rgba(72,80,95,0) 70%)}
  .client-ico svg{width:40px;height:40px}
  .node .lbl{font-size:20px;font-weight:800;color:var(--ink)}

  .hline{position:relative;height:0;justify-self:center;width:88px}
  .hline::before{content:'';position:absolute;left:0;right:8px;top:0;border-top:4px solid var(--blue-deep);
    filter:drop-shadow(0 2px 2px rgba(38,96,165,.3))}
  .hline::after{content:'';position:absolute;right:0;top:-8px;
    border-style:solid;border-width:8px 0 8px 14px;border-color:transparent transparent transparent var(--blue-deep)}
  .hline .lbl2{position:absolute;left:50%;top:-34px;transform:translateX(-50%);
    font-size:19px;font-weight:800;color:var(--blue-deep);white-space:nowrap}
  .hline.wrap{width:163px}
  .hline.wrap .lbl2{width:172px;white-space:normal;text-align:center;top:-56px;line-height:1.3}

  .accept-card,.worker-card{width:100%;border-radius:26px;position:relative;
    box-shadow:0 28px 56px -20px rgba(15,23,42,.32),0 8px 18px -10px rgba(15,23,42,.12)}
  .accept-card{background:linear-gradient(180deg,#fff,#f7fafd);border:1px solid var(--blue-line);
    padding:28px 30px 32px}
  .worker-card{background:linear-gradient(180deg,#fff,#fdf7f7);border:1px solid var(--red-line);
    padding:28px 30px 32px}
  .accept-card::before,.worker-card::before{content:"";position:absolute;top:0;left:22px;right:22px;height:5px;border-radius:0 0 4px 4px}
  .accept-card::before{background:linear-gradient(90deg,#2b6aa8,#8fbde6)}
  .worker-card::before{background:linear-gradient(90deg,#dc2626,#f0687a)}
  .ac-head,.w-head{font-size:25px;font-weight:800;text-align:center}
  .ac-head{color:var(--blue-deep)}
  .w-head{color:var(--red-deep)}
  .ac-body{margin-top:18px;display:flex;align-items:center;justify-content:center;gap:16px;
    background:linear-gradient(180deg,#eef6fd,var(--blue-bg));border:1px solid var(--blue-line);border-radius:18px;padding:26px 28px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
  .ac-ico{flex:0 0 auto;width:58px;height:58px;border-radius:15px;background:#fff;position:relative;
    display:flex;align-items:center;justify-content:center;color:var(--blue-deep);
    box-shadow:0 4px 10px -4px rgba(38,96,165,.4);border:1px solid var(--blue-line)}
  .ac-ico::before{content:"";position:absolute;inset:-11px;z-index:-1;border-radius:19px;
    background:radial-gradient(circle,rgba(38,96,165,.16),rgba(38,96,165,0) 70%)}
  .ac-ico svg{width:29px;height:29px}
  .ac-txt{font-size:24px;font-weight:800;color:var(--blue-deep)}

  .w-body{margin-top:16px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#fdedee,var(--red-bg));border:1px solid var(--red-line);border-radius:18px;padding:16px 20px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
  .w-cap{margin-top:8px;font-size:15.5px;font-weight:700;color:var(--muted);text-align:center}

  .cluster{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;position:relative;z-index:1}
  .cluster::before{content:"";position:absolute;inset:-22px;z-index:-1;border-radius:50%;
    background:radial-gradient(circle,rgba(220,38,38,.13),rgba(220,38,38,0) 70%)}
  .wdot{width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 32% 26%,#f0687a,#c81c33);
    box-shadow:inset 0 2px 3px rgba(255,255,255,.4),0 4px 9px -3px rgba(199,30,50,.55)}

  .branch-wrap{width:1230px;margin-top:2px}
  .branch-label{margin-top:20px;text-align:center}
  .branch-pill{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(180deg,#fff,#fbfbfc);
    border:1px solid var(--gray-line);
    border-radius:999px;padding:13px 26px;font-size:18px;font-weight:700;color:var(--gray-deep);
    box-shadow:0 14px 28px -14px rgba(20,30,60,.3),0 4px 10px -6px rgba(20,30,60,.14),inset 0 1px 0 rgba(255,255,255,.8)}
  .branch-pill b{color:#4b5364;font-weight:800}
  .branch-pill i{font-style:normal;color:var(--muted);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">① 구조 · IOCP ACCEPT 처리</div>
    <div class="title">Accept는 <span class="r">Worker</span>와 분리된다</div>
    <div class="rule"></div>
    <div class="sub">AcceptThread가 accept()를 전담 — Worker Pool은 관여하지 않는다</div>

    <div class="flow">
      <div class="node-row">
        <div class="node client">
          <div class="client-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2.2"/><path d="M8 21h8M12 17v4"/></svg></div>
          <div class="lbl">Client</div>
        </div>

        <div class="hline"><span class="lbl2">연결</span></div>

        <div class="node accept">
          <div class="accept-card">
            <div class="ac-head">AcceptThread</div>
            <div class="ac-body">
              <div class="ac-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5 5-5"/></svg></div>
              <div class="ac-txt">accept()</div>
            </div>
          </div>
        </div>

        <div class="hline wrap"><span class="lbl2">WSARecv 이후<br>I/O 처리</span></div>

        <div class="node worker">
          <div class="worker-card">
            <div class="w-head">Worker Pool</div>
            <div class="w-body">
              <div class="cluster">
                <div class="wdot"></div><div class="wdot"></div><div class="wdot"></div>
                <div class="wdot"></div><div class="wdot"></div><div class="wdot"></div>
              </div>
            </div>
            <div class="w-cap">Network I/O 처리</div>
          </div>
        </div>
      </div>

      <div class="branch-label">
        <span class="branch-pill"><b>AcceptEx</b> 사용 시 — Worker가 accept까지 처리 <i>(전환 가능)</i></span>
      </div>
      <div class="branch-wrap">
        <svg viewBox="0 0 1230 100" width="1230" height="100">
          <defs>
            <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 Z" fill="#a3abba"/>
            </marker>
          </defs>
          <path d="M500,4 C 500,86 960,86 1026,4" fill="none" stroke="#a3abba" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arrowGray)" style="filter:drop-shadow(0 2px 3px rgba(90,100,120,.22))"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
