<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2-variations');
    font-weight:45 920;font-display:block}
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg1:#eef1f7; --bg2:#e3e7f0; --card:#fff;
    --ink:#0f172a; --sub:#54607a; --faint:#93a0b4; --foot:#8892a3;
    --line:#e9edf4; --line2:#f0f3f9; --surface:#f6f8fc;
    --red:#ef4444; --red-deep:#dc2626; --red-bg:#fef2f2; --red-line:#f6cfcf;
    --blue:#3b82f6; --blue-deep:#2563eb; --blue-bg:#eff6ff; --blue-line:#c4dbfb;
    --green:#10b981; --green-deep:#059669; --green-bg:#ecfdf5; --green-line:#bbe9d4;
    --slate:#64748b; --slate-deep:#475569;
    --sh-card:0 1px 0 rgba(255,255,255,.92) inset,0 44px 84px -36px rgba(15,23,42,.32),0 16px 34px -18px rgba(15,23,42,.13);
    --sh-sm:0 10px 24px -16px rgba(15,23,42,.30);
  }
  html,body{width:1200px;height:650px;
    background:
      radial-gradient(1100px 520px at 8% -16%,#ffffff 0%,rgba(255,255,255,0) 58%),
      radial-gradient(880px 480px at 112% -10%,#eaf1fc 0%,rgba(234,241,252,0) 56%),
      linear-gradient(135deg,var(--bg1),var(--bg2));
    font-family:'Pretendard','Malgun Gothic','Noto Sans KR',sans-serif;color:var(--ink);
    font-feature-settings:"tnum" 1;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}

  .card{position:absolute;inset:24px;border-radius:28px;border:1px solid rgba(15,23,42,.05);
    background:
      radial-gradient(620px 400px at 50% 118%,rgba(239,68,68,.07),rgba(239,68,68,0) 62%),
      radial-gradient(560px 360px at 97% -12%,rgba(239,68,68,.06),rgba(239,68,68,0) 66%),
      radial-gradient(520px 340px at -4% 4%,rgba(37,99,235,.045),rgba(37,99,235,0) 62%),
      linear-gradient(180deg,#ffffff,#fcfdfe);
    box-shadow:var(--sh-card);padding:38px 56px 22px;display:flex;flex-direction:column;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,var(--slate),#94a3b8 32%,var(--red) 60%,var(--red-deep));opacity:.96}

  .eyebrow{display:inline-flex;align-self:flex-start;align-items:center;gap:8px;font-size:15px;font-weight:800;
    letter-spacing:.2px;color:var(--red-deep);background:linear-gradient(180deg,#fff5f5,var(--red-bg));
    border:1px solid var(--red-line);padding:7px 15px;border-radius:999px;
    box-shadow:0 6px 14px -8px rgba(220,38,38,.4),0 1px 0 rgba(255,255,255,.75) inset}
  .eyebrow .no{font-weight:900}
  .title{margin-top:13px;font-size:40px;font-weight:800;letter-spacing:-1.4px;line-height:1.12}
  .title .r{color:var(--red-deep)}
  .rule{width:72px;height:6px;border-radius:3px;margin:14px 0 11px;
    background:linear-gradient(90deg,var(--red),#fb7185);box-shadow:0 5px 12px -4px rgba(239,68,68,.55)}
  .sub{font-size:18.5px;font-weight:500;color:var(--sub);line-height:1.45}
  .sub b{color:var(--ink);font-weight:700}
  .sub .r{color:var(--red-deep);font-weight:800}

  /* ===== 수렴 다이어그램 ===== */
  .converge{width:640px;margin:14px auto 0;display:flex;flex-direction:column;align-items:center}
  .qtop{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13.5px;font-weight:800;
    color:var(--slate);letter-spacing:.2px}
  .qtop .cnt{color:var(--slate-deep);background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:3px 11px;box-shadow:var(--sh-sm)}
  .pkts{display:flex;justify-content:center;gap:16px}
  .pkt{position:relative;width:84px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px;
    background:
      linear-gradient(180deg,rgba(255,255,255,.32),rgba(255,255,255,0) 52%),
      linear-gradient(180deg,#9fadC1,#5e6d82);
    box-shadow:0 8px 16px -6px rgba(71,85,105,.55),0 2px 4px -2px rgba(30,41,59,.4),
      inset 0 1px 0 rgba(255,255,255,.5),inset 0 -4px 8px -4px rgba(30,41,59,.45);
    border:1px solid rgba(71,85,105,.28)}

  .conv-svg{display:block;width:640px;height:126px;margin-top:1px}

  .wsasend{position:relative;margin-top:1px;display:flex;align-items:center;gap:18px;
    padding:17px 32px;border-radius:21px;border:1.6px solid transparent;
    background:
      radial-gradient(150px 72px at 50% 0%,rgba(255,255,255,.85),rgba(255,255,255,0) 72%) padding-box,
      linear-gradient(180deg,#ffffff,#fff5f5) padding-box,
      linear-gradient(155deg,#fbdada 8%,#ef5a5a 92%) border-box;
    box-shadow:0 34px 60px -26px rgba(220,38,38,.46),0 14px 28px -16px rgba(15,23,42,.16),
      inset 0 1px 0 rgba(255,255,255,.95)}
  .wsasend::after{content:"";position:absolute;inset:-34px -26px;z-index:-1;border-radius:44px;
    background:radial-gradient(closest-side,rgba(220,38,38,.16),rgba(220,38,38,0) 78%)}
  .ws-num{font-size:62px;font-weight:900;line-height:.9;letter-spacing:-3px;
    background:linear-gradient(165deg,#f56b6b,var(--red-deep) 78%);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 5px 9px rgba(220,38,38,.4)) drop-shadow(0 1px 1px rgba(120,10,20,.25))}
  .ws-txt{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .ws-h{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-.4px}
  .ws-h b{color:var(--red-deep)}
  .ws-b{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line2);
    border-radius:999px;padding:6px 14px;font-size:14px;font-weight:800;color:var(--sub);
    box-shadow:0 8px 18px -10px rgba(15,23,42,.28),inset 0 1px 0 rgba(255,255,255,.8)}
  .ws-b .dot{width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#f56b6b,var(--red-deep));box-shadow:0 0 0 3px rgba(220,38,38,.14)}

  .loopnote{position:absolute;left:calc(100% + 26px);top:50%;transform:translateY(-50%);
    display:flex;align-items:center;gap:12px;white-space:nowrap;
    font-size:14px;font-weight:700;color:var(--green-deep);line-height:1.4;letter-spacing:-.1px}
  .loopnote .lic{flex:0 0 auto;width:36px;height:36px;border-radius:11px;
    background:linear-gradient(180deg,#f2fdf8,var(--green-bg));border:1px solid var(--green-line);
    display:flex;align-items:center;justify-content:center;color:var(--green-deep);
    box-shadow:0 6px 14px -6px rgba(5,150,105,.4),inset 0 1px 0 rgba(255,255,255,.8)}
  .loopnote .lic svg{width:20px;height:20px}
  .loopnote b{font-weight:800}

  .recvnote{position:absolute;right:calc(100% + 26px);top:50%;transform:translateY(-50%);
    display:flex;align-items:center;gap:12px;white-space:nowrap;text-align:right;
    font-size:14px;font-weight:700;color:var(--blue-deep);line-height:1.4;letter-spacing:-.1px}
  .recvnote .rtx b{font-weight:800}
  .recvnote .rv-ic{flex:0 0 auto;width:36px;height:36px;border-radius:11px;
    background:linear-gradient(180deg,#f5faff,var(--blue-bg));color:var(--blue-deep);
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;
    box-shadow:0 6px 14px -6px rgba(37,99,235,.42),inset 0 1px 0 rgba(255,255,255,.85);border:1px solid var(--blue-line)}

  .foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);
    font-size:15px;color:var(--foot);font-weight:500;line-height:1.45;letter-spacing:-.1px}
  .foot b{color:var(--sub);font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow"><span class="no">③</span> 설계 · 1-PENDING 패턴</div>
    <div class="title">여러 개 쌓여도 <span class="r">I/O는 1건</span></div>
    <div class="rule"></div>
    <div class="sub">SendQ에 아무리 쌓여도 — 모아서 <b>WSASend 한 번(Overlapped 1개)</b>으로 내보낸다</div>

    <div class="converge">
      <div class="qtop">SendQ에 쌓인 데이터 <span class="cnt">몇 개든</span></div>
      <div class="pkts">
        <div class="pkt">P1</div><div class="pkt">P2</div><div class="pkt">P3</div><div class="pkt">P4</div><div class="pkt">P5</div>
      </div>

      <svg class="conv-svg" viewBox="0 0 640 126" fill="none">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f2adad" stop-opacity=".5"/>
            <stop offset="1" stop-color="#dc2626"/>
          </linearGradient>
          <radialGradient id="hub" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#dc2626" stop-opacity=".26"/>
            <stop offset="1" stop-color="#dc2626" stop-opacity="0"/>
          </radialGradient>
          <filter id="cshadow" x="-30%" y="-20%" width="160%" height="150%">
            <feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="#dc2626" flood-opacity="0.16"/>
          </filter>
        </defs>
        <ellipse cx="320" cy="112" rx="58" ry="24" fill="url(#hub)"/>
        <g filter="url(#cshadow)" stroke="url(#cg)" stroke-width="3.6" stroke-linecap="round">
          <path d="M100 4 C100 76, 320 64, 320 120"/>
          <path d="M210 4 C210 76, 320 72, 320 120"/>
          <path d="M320 4 L320 120"/>
          <path d="M430 4 C430 76, 320 72, 320 120"/>
          <path d="M540 4 C540 76, 320 64, 320 120"/>
        </g>
        <circle cx="320" cy="120" r="9.5" fill="none" stroke="#dc2626" stroke-opacity=".26" stroke-width="2"/>
        <circle cx="320" cy="120" r="5" fill="#dc2626"/>
      </svg>

      <div class="wsasend">
        <div class="recvnote">
          <div class="rtx">Recv도 동일<br><b>WSARecv 1개로 받아 전부 파싱</b></div>
          <div class="rv-ic">R</div>
        </div>
        <div class="ws-num">1</div>
        <div class="ws-txt">
          <div class="ws-h"><b>WSASend</b> 단 한 번</div>
          <div class="ws-b"><i class="dot"></i>Overlapped 1개 = I/O 1건</div>
        </div>
        <div class="loopnote">
          <div class="lic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
            </svg>
          </div>
          <div>완료 통지 오면<br><b>다시 모아서 1건</b></div>
        </div>
      </div>
    </div>

    <div class="foot">세션당 1개라 <b>전송 순서가 자연히 FIFO로 직렬화</b>되고, 완료 처리는 <b>"보내는 중" 플래그 하나</b>로 끝난다. 상세는 노션 원문 참고</div>
  </div>
</body>
</html>
