<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1a1e2a; --sub:#3a4254; --muted:#7c8597; --faint:#9aa3b2;
    --line:#eef0f3; --track:#e8ecf2;
    --red:#d7263d; --deep:#b3122a; --red-bg:#fdeef0; --red-line:#f4c4cc;
    --blue:#3a78b8; --blue-ink:#2b6aa8; --blue-deep:#1f5088; --blue-bg:#e7f0fa; --blue-line:#cfe0f2; --slate:#566072;
    --green:#1f9d6b; --green-ink:#15805a; --green-deep:#0d6b49; --green-bg:#e7f6ef; --green-line:#c3e6d5;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Consolas",monospace;
    --sh-card:0 1px 3px rgba(30,40,70,.05),0 14px 44px rgba(30,40,70,.075);
  }
  html,body{width:1600px;height:900px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;color:var(--ink);
    word-break:keep-all;overflow-wrap:break-word;
    font-feature-settings:"tnum" 1,"kern" 1,"calt" 1;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .card{position:absolute;inset:28px;border-radius:30px;border:1px solid var(--line);
    background:var(--card);box-shadow:var(--sh-card);
    padding:44px 60px 44px;display:flex;flex-direction:column;overflow:hidden}

  .top{display:flex;align-items:center;justify-content:space-between}
  .eyebrow{display:inline-flex;align-items:center;gap:11px;
    font-size:16px;font-weight:800;letter-spacing:2.6px;color:var(--muted);text-transform:uppercase}
  .eyebrow .d{width:9px;height:9px;border-radius:50%;background:var(--green)}
  .ddtag{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;letter-spacing:.4px;
    color:var(--slate);background:#f1f3f7;border:1px solid #e2e6ec;border-radius:999px;padding:7px 15px}
  .ddtag b{color:var(--green-ink)}

  .title{margin-top:16px;font-size:56px;font-weight:800;color:var(--ink);letter-spacing:-2px;line-height:1.02}
  .title .r{color:var(--deep);font-family:var(--mono);font-size:52px}
  .title .g{color:var(--green-ink)}

  .stage{flex:1;display:flex;align-items:stretch;justify-content:center;gap:0;padding-top:24px}

  .panel{flex:1;border-radius:28px;position:relative;overflow:hidden;
    display:flex;flex-direction:column;padding:30px 34px 30px}
  .panel.fin{background:var(--card);border:1.5px solid #e3e8ef;
    box-shadow:0 1px 3px rgba(30,40,70,.05),0 12px 30px -18px rgba(30,40,70,.16)}
  .panel.rst{background:var(--card);border:2px solid var(--green-line);z-index:2;
    box-shadow:0 1px 3px rgba(30,40,70,.05),0 16px 40px -20px rgba(31,157,107,.26)}

  .p-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;position:relative;z-index:3}
  .p-t{font-size:31px;font-weight:800;letter-spacing:-.6px}
  .panel.fin .p-t{color:var(--slate)} .panel.rst .p-t{color:var(--green-ink)}
  .p-s{font-family:var(--mono);font-size:16px;font-weight:800;padding:6px 13px;border-radius:9px}
  .panel.fin .p-s{color:var(--faint);background:#f1f3f7;border:1px solid #e6eaf0}
  .panel.rst .p-s{color:var(--green-ink);background:var(--green-bg);border:1px solid var(--green-line)}

  .lanes{display:flex;justify-content:space-between;margin:18px 8px 6px;position:relative;z-index:3;
    font-size:15px;font-weight:800;letter-spacing:.6px;color:var(--muted);text-transform:uppercase}
  .lanes .sv{color:var(--blue-ink)}

  .seq{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;padding:8px 20px}

  /* dashed lifelines + station node caps */
  .ll{position:absolute;top:4px;bottom:4px;width:2px;border-radius:2px;z-index:1}
  .ll.sv{left:20px;background:repeating-linear-gradient(180deg,#b9cbe0,#b9cbe0 6px,transparent 6px,transparent 14px)}
  .ll.cl{right:20px;background:repeating-linear-gradient(180deg,#cbd3de,#cbd3de 6px,transparent 6px,transparent 14px)}
  .ll::before{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);
    width:12px;height:12px;border-radius:50%;background:#fff}
  .ll.sv::before{border:2.5px solid #6f9fce}
  .ll.cl::before{border:2.5px solid #aeb7c3}
  .panel.rst .ll.sv{background:repeating-linear-gradient(180deg,#a8d3bd,#a8d3bd 6px,transparent 6px,transparent 14px)}
  .panel.rst .ll.sv::before{border-color:#5bb488}
  .panel.rst .ll.cl::before{border-color:#b7bdc6}

  /* FIN — flat CSS arrows (solid shaft + head + station dot) */
  .arr{position:relative;z-index:2;height:50px}
  .arr .shaft{position:absolute;top:50%;transform:translateY(-50%);height:7px;border-radius:4px;z-index:1}
  .arr .head{position:absolute;top:50%;transform:translateY(-50%);width:0;height:0;z-index:2}
  .arr .dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;z-index:2;
    box-shadow:0 0 0 3px #fff}
  .arr .lb{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:var(--mono);
    font-size:18px;font-weight:800;background:#fff;padding:3px 15px;border-radius:7px;color:#5a6472;z-index:3;
    border:1px solid var(--line)}
  .arr .lb.muted{color:#9aa3b2}
  /* out (→): tail dot on server, head at client */
  .arr.out .shaft{left:6px;right:20px;background:#6b7480}
  .arr.out .head{right:0;border-left:18px solid #6b7480;border-top:10px solid transparent;border-bottom:10px solid transparent}
  .arr.out .dot{left:0;background:#6b7480}
  /* in (←): tail dot on client, head at server */
  .arr.in .shaft{left:20px;right:6px;background:#6b7480}
  .arr.in .head{left:0;border-right:18px solid #6b7480;border-top:10px solid transparent;border-bottom:10px solid transparent}
  .arr.in .dot{left:100%;background:#6b7480}
  /* light (ACK) variant */
  .arr.lt.out .shaft{background:#9aa3b2}
  .arr.lt.in .shaft{background:#9aa3b2}
  .arr.lt.out .head{border-left-color:#9aa3b2}
  .arr.lt.in .head{border-right-color:#9aa3b2}
  .arr.lt .dot{background:#9aa3b2}

  /* RST — one big flat arrow banner */
  .bolt{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;padding:0 6px}
  .boltbar{position:relative;z-index:1;width:100%;height:72px;display:flex;align-items:center;justify-content:center;
    background:var(--green);
    clip-path:polygon(0 0, calc(100% - 50px) 0, 100% 50%, calc(100% - 50px) 100%, 0 100%)}
  .boltbar .t{position:relative;z-index:2;font-family:var(--mono);font-size:34px;font-weight:800;color:#fff;letter-spacing:3px;
    padding-right:44px}

  /* hero cost / win block */
  .hero{display:flex;align-items:center;gap:22px;border-radius:22px;padding:24px 28px;position:relative;z-index:3}
  .hero .ic{position:relative;overflow:hidden;flex:0 0 auto;width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center}
  .hero .ic svg{position:relative;z-index:1}
  .hero .tx{display:flex;flex-direction:column;line-height:1}
  .hero .lab{font-size:18px;font-weight:800;letter-spacing:.2px;margin-bottom:9px}
  .hero .big{font-weight:800;letter-spacing:-1.5px;display:flex;align-items:baseline;gap:5px}
  .hero .big .n{font-size:60px}
  .hero .big .u{font-size:28px;font-weight:800}

  .hero.cost{background:var(--red-bg);border:1.5px solid var(--red-line)}
  .hero.cost .ic{background:var(--red)}
  .hero.cost .lab{color:var(--deep)}
  .hero.cost .big{color:var(--deep)}
  .hero.win{background:var(--green-bg);border:1.6px solid var(--green-line)}
  .hero.win .ic{background:var(--green)}
  .hero.win .lab{color:var(--green-ink)}
  .hero.win .big{color:var(--green-ink)}

  /* VS — flat medallion */
  .vs{width:104px;display:flex;align-items:center;justify-content:center;position:relative;z-index:6}
  .vs .med{position:relative;width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:#eef1f6;border:1px solid #e2e6ec}
  .vs .med b{position:relative;z-index:1;font-size:25px;font-weight:900;letter-spacing:.5px;color:#7a828f}

  .foot{margin-top:24px;display:flex;align-items:center;justify-content:center;gap:16px}
  .foot .fchip{display:inline-flex;align-items:center;gap:13px;font-size:20px;font-weight:800;color:var(--sub);
    background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px 28px;letter-spacing:-.3px}
  .foot .fchip .k{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .foot .fchip b{color:var(--deep)}
  .foot .fchip.code{font-family:var(--mono);font-size:16px;color:var(--slate);background:#f1f3f7;border-color:#e0e5ec}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="eyebrow"><span class="d"></span>Session · Fast Close</div>
      <div class="ddtag"><b>심화</b> · Deep Dive</div>
    </div>
    <div class="title">4-way 대신 <span class="r">RST</span> 한 방 — <span class="g">즉시 종료</span></div>

    <div class="stage">
      <div class="panel fin">
        <div class="p-head"><span class="p-t">정상 종료</span><span class="p-s">FIN · 4-way</span></div>
        <div class="lanes"><span class="sv">Server</span><span>Client</span></div>
        <div class="seq">
          <span class="ll sv"></span><span class="ll cl"></span>
          <div class="arr out">
            <span class="shaft"></span><span class="dot"></span><span class="head"></span><span class="lb">FIN</span>
          </div>
          <div class="arr in lt">
            <span class="shaft"></span><span class="dot"></span><span class="head"></span><span class="lb muted">ACK</span>
          </div>
          <div class="arr in">
            <span class="shaft"></span><span class="dot"></span><span class="head"></span><span class="lb">FIN</span>
          </div>
          <div class="arr out lt">
            <span class="shaft"></span><span class="dot"></span><span class="head"></span><span class="lb muted">ACK</span>
          </div>
        </div>
        <div class="hero cost">
          <div class="ic"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3.2 2"/></svg></div>
          <div class="tx"><span class="lab">TIME_WAIT 점유</span><span class="big"><span class="n">2</span><span class="u">분</span></span></div>
        </div>
      </div>

      <div class="vs"><div class="med"><b>VS</b></div></div>

      <div class="panel rst">
        <div class="p-head"><span class="p-t">RST 종료</span><span class="p-s">SO_LINGER {1,0}</span></div>
        <div class="lanes"><span class="sv">Server</span><span>Client</span></div>
        <div class="seq">
          <span class="ll sv"></span><span class="ll cl"></span>
          <div class="bolt"><div class="boltbar"><span class="t">RST</span></div></div>
        </div>
        <div class="hero win">
          <div class="ic"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
          <div class="tx"><span class="lab">TIME_WAIT 없음 · 포트 즉시 해방</span><span class="big"><span class="n">즉시</span></span></div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span class="fchip"><span class="k"></span>게임 서버의 종료는 대개 <b>비정상 상황</b> (핵 · 타임아웃 · 킥) → 잔여 데이터 유실 허용</span>
    </div>
  </div>
</body>
</html>
