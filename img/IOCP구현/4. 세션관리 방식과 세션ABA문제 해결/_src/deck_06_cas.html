<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1a1e2a; --sub:#3a4254; --muted:#7c8597; --faint:#9aa3b2;
    --line:#eef0f3;
    --red:#d7263d; --deep:#b3122a; --red-bg:#fdeef0; --red-line:#f4c4cc;
    --blue:#3a78b8; --blue-ink:#2b6aa8; --blue-deep:#1f5088; --blue-bg:#e7f0fa; --blue-line:#cfe0f2; --slate:#566072;
    --green:#1f9d6b; --green-ink:#15805a; --green-deep:#0d6b49; --green-bg:#e7f6ef; --green-line:#c3e6d5;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Consolas",monospace;
    --sh-card:0 1px 3px rgba(30,40,70,.05),0 14px 44px rgba(30,40,70,.075);
  }
  html,body{width:1600px;height:900px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;color:var(--ink);
    word-break:keep-all;overflow-wrap:break-word;
    font-feature-settings:"tnum" 1,"kern" 1,"calt" 1;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .card{position:absolute;inset:28px;border-radius:30px;border:1px solid var(--line);
    background:var(--card);box-shadow:var(--sh-card);
    padding:44px 60px 44px;display:flex;flex-direction:column;overflow:hidden}

  .top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
  .eyebrow{display:inline-flex;align-items:center;gap:11px;
    font-size:16px;font-weight:800;letter-spacing:2.6px;color:var(--muted);text-transform:uppercase}
  .eyebrow .d{width:9px;height:9px;border-radius:50%;background:var(--red)}
  .ddtag{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;letter-spacing:.4px;
    color:var(--slate);background:#eef1f5;border:1px solid #e2e6ec;border-radius:999px;padding:7px 15px}
  .ddtag b{color:var(--deep)}

  .title{margin-top:14px;font-size:50px;font-weight:800;color:var(--ink);letter-spacing:-1.7px;line-height:1.04;position:relative;z-index:2}
  .title .r{color:var(--deep)} .title .g{color:var(--green-ink)} .title .mono{font-family:var(--mono);font-size:45px}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;gap:34px;padding-top:6px;position:relative;z-index:2}

  /* hero scene: 0 → (+1 revive) → CAS shield ✗ → 1 blocked */
  .scene{display:flex;align-items:center;justify-content:center;gap:20px}
  .tok{position:relative;flex:0 0 auto;width:168px;height:168px;border-radius:34px;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .tok .n{font-family:var(--mono);font-size:82px;font-weight:800;line-height:1}
  .tok .lb{font-size:17px;font-weight:800;margin-top:8px;letter-spacing:-.3px}
  .tok.dead{background:#e8ecf2;border:2px solid #d0d6df}
  .tok.dead .n{color:#7a8494} .tok.dead .lb{color:#8a94a4}
  .tok.ghost{background:#f5f7fa;border:2.5px dashed #ccd3dd}
  .tok.ghost .n{color:#b3bcc8} .tok.ghost .lb{color:#aab3c0}

  .attempt{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:8px;width:132px}
  .attempt .pl{font-family:var(--mono);font-size:30px;font-weight:800;color:var(--slate)}
  .attempt .cap{font-size:15px;font-weight:800;color:var(--muted);letter-spacing:-.2px;text-align:center}

  .shieldwrap{position:relative;flex:0 0 auto;width:230px;height:230px;display:flex;align-items:center;justify-content:center}
  .shield{position:relative;z-index:1;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
  .shield .lab{position:absolute;bottom:-6px;font-family:var(--mono);font-size:20px;font-weight:800;color:#fff;letter-spacing:1px;
    background:var(--green-deep);padding:5px 20px;border-radius:999px}

  .verdict{align-self:center;display:flex;align-items:center;gap:22px}
  .verdict .cond{font-family:var(--mono);font-size:26px;font-weight:800;color:var(--deep);
    background:var(--red-bg);border:1.6px solid var(--red-line);border-radius:15px;padding:14px 24px}
  .verdict .cond .ko{font-family:'Pretendard',"Malgun Gothic",sans-serif;letter-spacing:-.3px}
  .verdict .big{font-size:52px;font-weight:800;letter-spacing:-1.4px;color:var(--green-deep)}

  /* minimal footer: 둘 다 필요 */
  .roles{align-self:center;display:flex;align-items:center;gap:16px}
  .role{display:flex;align-items:center;gap:14px;padding:15px 24px;border-radius:16px;
    background:var(--card);border:1.5px solid var(--line);
    box-shadow:0 1px 3px rgba(30,40,70,.05),0 8px 22px -14px rgba(30,40,70,.14)}
  .role .rn{flex:0 0 auto;font-family:var(--mono);font-size:17px;font-weight:800;padding:8px 15px;border-radius:11px;white-space:nowrap}
  .role.cas .rn{background:var(--green-bg);color:var(--green-ink);border:1px solid var(--green-line)}
  .role.flag .rn{background:var(--blue-bg);color:var(--blue-ink);border:1px solid var(--blue-line)}
  .role .rt{font-size:18px;font-weight:700;color:var(--sub);letter-spacing:-.3px;line-height:1.3}
  .role .rt b{color:var(--ink);font-weight:800} .role .rt .m{font-family:var(--mono);font-size:15px}
  .roles .amp{font-size:16px;font-weight:800;color:var(--muted);letter-spacing:.5px}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="eyebrow"><span class="d"></span>Session · Zombie Reference</div>
      <div class="ddtag"><b>심화</b> · Deep Dive</div>
    </div>
    <div class="title">죽은 세션을 되살리는 <span class="r mono">0→1</span>을 <span class="g">CAS</span>가 원천 차단</div>

    <div class="stage">
      <div class="scene">
        <div class="tok dead"><span class="n">0</span><span class="lb">해제됨 · IOCount 0</span></div>

        <div class="attempt">
          <svg width="120" height="30" viewBox="0 0 120 30" fill="none">
            <path d="M6 15 H92" stroke="#aeb6c3" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 11"/>
            <path d="M88 4 L118 15 L88 26 Z" fill="#aeb6c3"/>
          </svg>
          <span class="pl">+1</span>
          <span class="cap">되살리기 시도<br>(좀비 참조)</span>
        </div>

        <div class="shieldwrap">
          <div class="shield">
            <svg width="200" height="200" viewBox="0 0 72 72" fill="none">
              <path d="M36 4 L62 14 V37 C62 53 50 63.5 36 69 C22 63.5 10 53 10 37 V14 Z" fill="#1f9d6b" stroke="#15805a" stroke-width="1.6"/>
              <g transform="rotate(45 36 37)">
                <path d="M25 37 H47 M36 26 V48" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
              </g>
            </svg>
            <span class="lab">CAS</span>
          </div>
        </div>

        <div class="tok ghost"><span class="n">1</span><span class="lb">차단됨</span></div>
      </div>

      <div class="verdict">
        <span class="cond">cur == 0 → <span class="ko">실패</span></span>
        <span class="big">0→1 원천 차단</span>
      </div>

      <div class="roles">
        <div class="role cas">
          <span class="rn">CAS</span>
          <span class="rt"><b>해제된 세션</b>(<span class="m">0</span>)의 좀비 참조 차단</span>
        </div>
        <span class="amp">＋</span>
        <div class="role flag">
          <span class="rn">_disconnecting</span>
          <span class="rt"><b>종료 중 세션</b>(<span class="m">&gt;0</span>)에 새 IO 차단</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
