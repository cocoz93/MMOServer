<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1a1e2a; --sub:#3a4254; --muted:#7c8597; --faint:#9aa3b2;
    --line:#eef0f3;
    --red:#d7263d; --deep:#b3122a; --red-bg:#fdeef0; --red-line:#f4c4cc;
    --blue:#3a78b8; --blue-ink:#2b6aa8; --blue-deep:#1f5088; --blue-bg:#e7f0fa; --blue-line:#cfe0f2; --slate:#566072;
    --green:#1f9d6b; --green-ink:#15805a; --green-deep:#0d6b49; --green-bg:#e7f6ef; --green-line:#c3e6d5;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Consolas",monospace;
    --sh-card:0 1px 3px rgba(30,40,70,.05),0 14px 44px rgba(30,40,70,.075);
  }
  html,body{width:1600px;height:900px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;color:var(--ink);
    word-break:keep-all;overflow-wrap:break-word;
    font-feature-settings:"tnum" 1,"kern" 1,"calt" 1;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .card{position:absolute;inset:28px;border-radius:32px;border:1px solid var(--line);
    background:var(--card);
    box-shadow:var(--sh-card);
    padding:44px 60px 44px;display:flex;flex-direction:column;overflow:hidden}

  .top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between}
  .eyebrow{display:inline-flex;align-items:center;gap:11px;
    font-size:16px;font-weight:800;letter-spacing:2.6px;color:var(--muted);text-transform:uppercase}
  .eyebrow .d{width:9px;height:9px;border-radius:50%;background:var(--blue-ink)}
  .ddtag{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;letter-spacing:.4px;
    color:var(--slate);background:#f3f5f9;border:1px solid var(--line);border-radius:999px;padding:7px 15px}
  .ddtag b{color:var(--blue-deep)}

  .title{position:relative;z-index:2;margin-top:16px;font-size:54px;font-weight:800;color:var(--ink);letter-spacing:-1.8px;line-height:1.03}
  .title .b{color:var(--blue-ink)} .title .mono{font-family:var(--mono);font-size:49px;color:var(--blue-deep);letter-spacing:-1px}
  .title .r{color:var(--deep)}

  .stage{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:26px;padding-top:12px}
  .flow{display:flex;align-items:center;justify-content:center;gap:0}

  .side{width:326px;border-radius:22px;background:var(--card);position:relative;overflow:hidden;
    display:flex;flex-direction:column;padding:26px 28px 28px;
    box-shadow:0 1px 3px rgba(30,40,70,.05),0 10px 26px -14px rgba(30,40,70,.12)}
  .side::before{content:"";position:absolute;top:0;left:0;right:0;height:6px}
  .side .tag{position:relative;z-index:1;font-size:15px;font-weight:800;letter-spacing:.3px;padding:6px 15px;border-radius:999px;align-self:flex-start;margin-bottom:18px}
  .side .big{position:relative;z-index:1;font-size:30px;font-weight:800;letter-spacing:-.6px;line-height:1.14}
  .side .big em{font-style:normal;font-family:var(--mono)}
  .side .chip{position:relative;z-index:1;margin-top:20px;display:flex;align-items:center;gap:9px;border-radius:12px;padding:13px 15px;
    font-family:var(--mono);font-size:16px;font-weight:800;letter-spacing:-.2px}
  .side .chip .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .side .chip .ko{font-family:'Pretendard',"Malgun Gothic",sans-serif}

  .side.io{border:1.5px solid var(--blue-line)}
  .side.io::before{background:var(--blue-ink)}
  .side.io .tag{background:var(--blue-bg);color:var(--blue-ink)}
  .side.io .big em{color:var(--blue-deep)}
  .side.io .chip{background:var(--blue-bg);border:1px solid var(--blue-line);color:var(--blue-ink)} .side.io .chip .dot{background:var(--blue-ink)}
  .side.rel{border:1.6px solid var(--green-line)}
  .side.rel::before{background:var(--green)}
  .side.rel .tag{background:var(--green-bg);color:var(--green-ink)}
  .side.rel .big{color:var(--green-ink)} .side.rel .big em{font-family:var(--mono)}
  .side.rel .chip{background:var(--green-bg);border:1px solid var(--green-line);color:var(--green-ink)} .side.rel .chip .dot{background:var(--green)}

  .conn{width:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px}
  .conn .cl{font-size:14.5px;font-weight:800;color:var(--muted);letter-spacing:-.2px;text-align:center;line-height:1.25}
  .conn .cl .sub2{display:block;margin-top:3px;font-size:12.5px;font-weight:700;color:var(--faint)}
  .conn .cl .sub2 .m{font-family:var(--mono);letter-spacing:0}

  /* GIANT lock hero */
  .lockhero{position:relative;width:430px;display:flex;flex-direction:column;align-items:center;padding:0 8px}
  .lockhero .lk{position:relative;z-index:1}
  .lockhero .cond{position:relative;z-index:2;margin-top:6px;font-family:var(--mono);font-size:31px;font-weight:800;color:#fff;
    background:var(--blue-ink);padding:13px 34px;border-radius:999px;letter-spacing:.5px}
  .lockhero .verdict{position:relative;z-index:2;margin-top:16px;font-size:38px;font-weight:800;letter-spacing:-1px;color:var(--blue-deep);
    display:flex;align-items:center;gap:12px}
  .lockhero .verdict .strike{font-family:var(--mono);font-size:30px;color:var(--muted);text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:3px}
  .lockhero .sub{position:relative;z-index:2;margin-top:8px;font-size:19px;font-weight:700;color:var(--slate);letter-spacing:-.3px}

  .win{position:relative;display:flex;align-items:center;gap:18px;align-self:center;
    background:var(--green-bg);border:1.6px solid var(--green-line);border-radius:18px;padding:20px 36px;
    box-shadow:0 1px 3px rgba(30,40,70,.05),0 10px 24px -16px rgba(30,40,70,.12)}
  .win::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 4px 4px 0;
    background:var(--green)}
  .win .ck{flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--green);
    display:flex;align-items:center;justify-content:center}
  .win .wt{font-size:24px;font-weight:800;color:var(--green-ink);letter-spacing:-.4px}
  .win .wt b{color:var(--green-deep);text-decoration:underline;text-decoration-color:var(--green-line);text-underline-offset:4px}
  .win .wt .r{color:var(--deep)}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="eyebrow"><span class="d"></span>Session · Socket ABA</div>
      <div class="ddtag"><b>심화</b> · Deep Dive</div>
    </div>
    <div class="title"><span class="mono">IOCount ≥ 1</span>이면 소켓 핸들은 <span class="r">닫히지 않는다</span></div>

    <div class="stage">
      <div class="flow">
        <div class="side io">
          <span class="tag">IO 사용 코드</span>
          <div class="big"><em>PostRecv</em><br><em>PostSend</em></div>
          <div class="chip"><span class="dot"></span>IOCount + 1</div>
        </div>

        <div class="conn">
          <svg width="96" height="30" viewBox="0 0 96 30" fill="none">
            <path d="M6 15 H67" stroke="#3a78b8" stroke-width="8" stroke-linecap="round"/>
            <path d="M61 3.5 L95 15 L61 26.5 Z" fill="#2b6aa8"/>
            <circle cx="6" cy="15" r="5.5" fill="#3a78b8" stroke="#fff" stroke-width="2"/>
          </svg>
          <div class="cl">pin<span class="sub2"><span class="m">acquire</span></span></div>
        </div>

        <div class="lockhero">
          <svg class="lk" width="212" height="250" viewBox="0 0 200 240" fill="none">
            <!-- shackle -->
            <path d="M64 114 V80 A36 36 0 0 1 136 80 V114" fill="none" stroke="#2b6aa8" stroke-width="16" stroke-linecap="round"/>
            <!-- body -->
            <rect x="34" y="104" width="132" height="118" rx="26" fill="#3a78b8"/>
            <!-- keyhole -->
            <circle cx="100" cy="150" r="13.5" fill="#1f5088"/>
            <path d="M94.2 152 L106 152 L110.5 189 L89.5 189 Z" fill="#1f5088"/>
          </svg>
          <div class="cond">IOCount ≥ 1</div>
          <div class="verdict"><span class="strike">closesocket</span> 잠금</div>
          <div class="sub">사용 중엔 핸들을 못 닫는다</div>
        </div>

        <div class="conn">
          <svg width="96" height="30" viewBox="0 0 96 30" fill="none">
            <path d="M6 15 H67" stroke="#1f9d6b" stroke-width="8" stroke-linecap="round"/>
            <path d="M61 3.5 L95 15 L61 26.5 Z" fill="#15805a"/>
            <circle cx="6" cy="15" r="5.5" fill="#1f9d6b" stroke="#fff" stroke-width="2"/>
          </svg>
          <div class="cl">IOCount = 0<span class="sub2"><span class="m">pending</span> 완료</span></div>
        </div>

        <div class="side rel">
          <span class="tag">해제 시점</span>
          <div class="big"><em>ReleaseSession</em><br>→ <em>closesocket</em></div>
          <div class="chip"><span class="dot"></span>Push(index)<span class="ko"> · 핸들 반납</span></div>
        </div>
      </div>

      <div class="win">
        <div class="ck"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <div class="wt">핸들은 <b>닫힌 뒤에야</b> 재사용된다 → 사용 중 핸들이 새 연결과 <span class="r">겹칠 수 없다</span></div>
      </div>
    </div>
  </div>
</body>
</html>
