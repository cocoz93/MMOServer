<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Pretendard';
    src:url('fonts/PretendardVariable.woff2') format('woff2');
    font-weight:100 900;font-style:normal;font-display:block}
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1a1e2a; --sub:#3a4254; --muted:#7c8597; --faint:#9aa3b2;
    --line:#eef0f3; --red:#d7263d; --deep:#b3122a; --red-bg:#fdeef0; --red-line:#f4c4cc;
    --blue:#3a78b8; --blue-ink:#2b6aa8; --blue-deep:#1f5088; --blue-bg:#e7f0fa; --blue-line:#cfe0f2; --slate:#566072;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Consolas",monospace;
    --sh-card:0 1px 3px rgba(30,40,70,.05),0 14px 44px rgba(30,40,70,.075);
  }
  html,body{width:1600px;height:900px;overflow:hidden;background:var(--bg);
    font-family:'Pretendard',"Malgun Gothic","Noto Sans KR",sans-serif;color:var(--ink);
    word-break:keep-all;overflow-wrap:break-word;
    font-feature-settings:"tnum" 1,"kern" 1,"calt" 1;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .card{position:absolute;inset:28px;border-radius:32px;border:1px solid var(--line);
    background:var(--card);
    box-shadow:var(--sh-card);
    padding:44px 64px 46px;display:flex;flex-direction:column;overflow:hidden}

  .top{display:flex;align-items:center;justify-content:space-between}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;
    font-size:15px;font-weight:800;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
  .eyebrow .d{width:8px;height:8px;border-radius:50%;background:var(--red)}
  .pageno{font-size:15px;font-weight:800;color:var(--faint);letter-spacing:1px}
  .pageno b{color:var(--ink)}
  .title{margin-top:16px;font-size:46px;font-weight:800;color:var(--ink);letter-spacing:-1.4px;line-height:1.05}
  .title .b{color:var(--blue-ink)}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;gap:44px}

  /* 초대형 flow */
  .flow{display:flex;align-items:center;justify-content:center;gap:8px}
  .node{border:1px solid var(--line);border-radius:26px;background:var(--card);position:relative;
    box-shadow:0 1px 3px rgba(30,40,70,.05),0 8px 22px -14px rgba(30,40,70,.14);
    padding:24px 28px 26px;display:flex;flex-direction:column;align-items:center}
  .node::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;border-radius:26px 26px 0 0}
  .node.stack::before{background:var(--slate)}
  .node.sess::before{background:var(--blue-ink)}
  .node .tag{font-size:18px;font-weight:800;padding:8px 22px;border-radius:999px;letter-spacing:-.2px;margin-bottom:20px}
  .node.stack .tag{background:#eef0f4;color:#49546a}
  .node.sess .tag{background:var(--blue-bg);color:var(--blue-ink)}

  .node.stack{width:308px}
  .chips{display:flex;flex-direction:column;gap:10px;width:100%}
  .chip{height:66px;border-radius:15px;display:flex;align-items:center;justify-content:center;position:relative;
    font-size:30px;font-weight:800;font-family:var(--mono)}
  .chip.top{background:var(--blue-ink);color:#fff}
  .chip.top .fl{position:absolute;right:16px;font-size:14px;font-weight:800;font-family:'Pretendard',sans-serif;
    background:rgba(255,255,255,.26);padding:3px 12px;border-radius:999px;letter-spacing:.4px}
  .chip.rest{background:#eef1f5;color:#8892a4;border:1.5px solid #e2e6ec}

  .flowcol{display:flex;flex-direction:column;align-items:center;gap:34px;padding:0 34px;width:264px}
  .arow{display:flex;flex-direction:column;align-items:center}
  .arow .al{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:11px}
  .arow .al .k{font-family:var(--mono);font-size:19px}
  .arow.acc .al{color:var(--deep)}
  .arow.disc .al{color:var(--blue-ink)}

  .node.sess{width:452px}
  .grid16{display:grid;grid-template-columns:repeat(4,86px);grid-gap:14px}
  .cell{width:86px;height:86px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:800;font-family:var(--mono);position:relative}
  .cell.fill{background:var(--blue-ink);color:#fff}
  .cell.empty{border:2.5px dashed #c7cfdb;background:#f7f9fb;color:#aeb7c5}
  .cell.new{border:3.5px solid var(--red);background:var(--red-bg);color:var(--deep)}
  .cell.new::after{content:"NEW";position:absolute;bottom:-13px;font-family:'Pretendard',sans-serif;
    font-size:13px;font-weight:800;color:#fff;background:var(--red);padding:2px 10px;border-radius:999px;letter-spacing:.5px}

  /* SessionID bit bar */
  .bitwrap{display:flex;flex-direction:column}
  .bitlabel{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.3px;margin-bottom:13px}
  .bitlabel .m{font-family:var(--mono)}
  .bitlabel .g{font-weight:700;color:var(--faint);font-family:var(--mono);font-size:17px;margin-left:8px}
  .bitbar{display:flex;height:98px;border-radius:18px;overflow:hidden}
  .seg{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;position:relative}
  .seg.idx{flex:16;background:var(--blue-ink)}
  .seg.uid{flex:48;background:var(--red)}
  .seg::after{content:"";position:absolute;right:0;top:16%;height:68%;width:1px;background:rgba(255,255,255,.35)}
  .seg.uid::after{display:none}
  .seg .st{font-size:28px;font-weight:800;letter-spacing:-.3px}
  .seg .sb{font-size:16px;font-weight:700;opacity:.9;margin-top:4px;font-family:var(--mono)}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="eyebrow"><span class="d"></span>Session · Management</div>
      <div class="pageno"><b>02</b> / 04</div>
    </div>
    <div class="title">배열 관리 · Index Stack으로 <span class="b">재사용</span></div>

    <div class="stage">
      <div class="flow">
        <div class="node stack">
          <div class="tag">Free Index Stack</div>
          <div class="chips">
            <div class="chip top">06<span class="fl">TOP</span></div>
            <div class="chip rest">03</div>
            <div class="chip rest">12</div>
            <div class="chip rest">09</div>
          </div>
        </div>

        <div class="flowcol">
          <div class="arow acc">
            <div class="al">Accept · <span class="k">pop</span></div>
            <svg width="196" height="32" viewBox="0 0 196 32">
              <path d="M6 16 H164" stroke="#b3122a" stroke-width="8" stroke-linecap="round" fill="none"/>
              <path d="M160 3 L190 16 L160 29 Z" fill="#b3122a"/>
            </svg>
          </div>
          <div class="arow disc">
            <svg width="196" height="32" viewBox="0 0 196 32">
              <path d="M32 16 H190" stroke="#2b6aa8" stroke-width="8" stroke-linecap="round" fill="none"/>
              <path d="M36 3 L6 16 L36 29 Z" fill="#2b6aa8"/>
            </svg>
            <div class="al" style="margin-top:11px;margin-bottom:0">Disconnect · <span class="k">push</span></div>
          </div>
        </div>

        <div class="node sess">
          <div class="tag">세션 배열</div>
          <div class="grid16">
            <div class="cell fill">00</div><div class="cell fill">01</div><div class="cell fill">02</div><div class="cell empty">03</div>
            <div class="cell fill">04</div><div class="cell fill">05</div><div class="cell new">06</div><div class="cell fill">07</div>
            <div class="cell fill">08</div><div class="cell empty">09</div><div class="cell fill">10</div><div class="cell fill">11</div>
            <div class="cell empty">12</div><div class="cell fill">13</div><div class="cell fill">14</div><div class="cell fill">15</div>
          </div>
        </div>
      </div>

      <div class="bitwrap">
        <div class="bitlabel"><span class="m">SessionID</span> = Index + Unique Id<span class="g">8 Byte · 64 bit</span></div>
        <div class="bitbar">
          <div class="seg idx"><span class="st">Index</span><span class="sb">16 bit · 배열 접근</span></div>
          <div class="seg uid"><span class="st">Unique Id</span><span class="sb">48 bit · 세대 구분</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
