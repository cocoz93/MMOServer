global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9091"]

  - job_name: mmo_server
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: stress_client
    static_configs:
      - targets: ["__STRESS_CLIENT_IP__:9101"]

  - job_name: windows
    static_configs:
      - targets: ["localhost:9182"]
